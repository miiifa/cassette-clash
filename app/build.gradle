plugins {
    id "com.android.application"
}

android {
    namespace "com.miiifa.pokemondueloffline"
    compileSdk 35

    defaultConfig {
        applicationId "com.miiifa.pokemondueloffline"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
    }
}

tasks.register("copyPlayHtml", Copy) {
    from("../play.html")
    into("src/main/assets")
}

preBuild.dependsOn("copyPlayHtml")
