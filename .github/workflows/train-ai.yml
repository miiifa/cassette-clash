name: Train AI Weights

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write

jobs:
  train-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Train weights
        run: node scripts/train-ai.js
        env:
          TRAIN_ROUNDS: 50000
      - name: Commit learned weights
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "no learned weight changes"
          else
            git add src/learned-weights.json src/ai-weights.js
            git commit -m "Update learned AI weights"
            git push
          fi
