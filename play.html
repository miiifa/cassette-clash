<!doctype html><html lang=ja><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1,viewport-fit=cover'><title>コマスター オフライン</title><style>*{box-sizing:border-box}body{margin:0;background:#07101b;color:#f8fafc;font-family:system-ui,sans-serif}button{font:inherit}header{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#111827;box-shadow:0 4px 18px #0008}h1{font-size:18px;margin:0}.sub{font-size:12px;opacity:.8}.reset{border:0;border-radius:12px;padding:9px 12px;background:#facc15;color:#111827;font-weight:900}.app{max-width:760px;margin:auto;padding:10px;display:grid;gap:10px}.status{background:#f8fafc;color:#111827;border-radius:14px;padding:10px 12px;font-weight:900}.field{border-radius:18px;overflow:hidden;padding:10px;background:linear-gradient(135deg,#475569,#334155 55%,#111827);box-shadow:0 10px 30px #0008}.scorebar{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}.score{display:flex;justify-content:space-between;border-radius:10px;padding:6px 8px;font-size:13px;font-weight:900}.score.p2{background:#b91c1c}.score.p1{background:#2563eb}.turn{border:2px solid #facc15;background:#111827;border-radius:10px;text-align:center;padding:4px 8px;font-weight:900}.bench{min-height:70px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:6px 0}.slot{width:54px}.benchBtn{width:54px;height:54px;border-radius:999px;border:4px solid #e5e7eb;background:#e5e7eb;color:#111827;font-size:9px;font-weight:900;line-height:1.05;padding:4px;touch-action:none}.benchBtn.active{outline:4px solid #facc15}.benchBtn:disabled{opacity:.45}.meta{text-align:center;font-size:10px;margin-top:3px}.board{position:relative;aspect-ratio:100/92;max-width:660px;margin:auto}.lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;filter:drop-shadow(0 1px 2px #000c)}.edge{stroke:#fff;stroke-width:3.8;stroke-linecap:round}.node{position:absolute;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:999px;background:#fff;border:2px solid #e5e7eb;box-shadow:0 0 5px #fff;z-index:2}.node.spawn{width:30px;height:30px;border-width:3px;background:#dbeafe}.node.goal{width:40px;height:40px;border-width:4px;background:#f59e0b;display:grid;place-items:center;color:#fff;font-weight:900;box-shadow:0 0 18px #f59e0b}.node.goal.player{background:#38bdf8}.node.reach{outline:4px solid #60a5fa;outline-offset:3px}.node.attack{outline:4px solid #fb7185;outline-offset:3px}.fig{position:absolute;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:999px;border:4px solid #cbd5e1;display:grid;place-items:center;text-align:center;padding:4px;color:#fff;font-size:9px;font-weight:900;line-height:1.02;box-shadow:0 10px 18px #0008;z-index:4;touch-action:none}.fig.p1{background:#2563eb}.fig.p2{background:#dc2626}.fig.sel{outline:5px solid #facc15}.fig.attackable{outline:5px solid #fb7185}.fig.waiting{filter:grayscale(.55);opacity:.75}.mp{position:absolute;right:-3px;bottom:-3px;min-width:21px;height:21px;border-radius:999px;background:#0ea5e9;border:2px solid #fff;display:grid;place-items:center;font-size:12px}.mark{position:absolute;left:-6px;top:-6px;border-radius:999px;background:#111827dd;border:1px solid #fff;padding:2px 4px;font-size:9px}.pcRows{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.pcBox{background:#f8fafc;color:#111827;border-radius:12px;padding:8px}.pcTitle{font-size:12px;font-weight:900}.chips{display:flex;gap:6px;flex-wrap:wrap;min-height:26px}.chips span{background:#e5e7eb;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900}.actions{display:grid;grid-template-columns:72px 1fr 110px;gap:8px;margin-top:10px}.action{border:0;border-radius:12px;padding:12px 8px;font-weight:900}.surrender,.ability{background:#1d4ed8;color:#fff}.ai{background:#facc15;color:#111827;font-size:18px}.hint{background:#f8fafccc;color:#111827;border-radius:12px;padding:8px;font-size:12px;line-height:1.45;margin-top:8px}.log{background:#020617;border-radius:16px;padding:12px;min-height:96px;white-space:pre-wrap;font:12px ui-monospace,monospace;line-height:1.45}.overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:14px;z-index:50;background:#000b}.box{width:min(720px,100%);max-height:92vh;overflow:auto;background:#f8fafc;color:#111827;border-radius:22px;padding:14px;box-shadow:0 22px 60px #000b}.title{text-align:center;font-size:18px;font-weight:900;margin-bottom:10px}.battleStack{display:grid;gap:10px}.card{background:#e5e7eb;border-radius:18px;padding:10px;text-align:center}.name{font-weight:900;margin-bottom:8px}.wwrap{position:relative;width:min(48vw,190px);aspect-ratio:1;margin:auto}.pointer{position:absolute;left:50%;top:-4px;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:18px solid #111827;z-index:5}.wheel{position:absolute;inset:0;border-radius:999px;border:8px solid #111827;transition:transform 1.45s cubic-bezier(.12,.8,.18,1);box-shadow:inset 0 0 0 4px #fff,0 8px 18px #0004;overflow:hidden}.wheel:after{content:'';position:absolute;inset:38%;border-radius:999px;background:#111827;border:4px solid #fff;z-index:4}.wlabel{position:absolute;left:50%;top:50%;width:68px;margin-left:-34px;margin-top:-7px;padding:1px 3px;border-radius:999px;background:#ffffffbf;color:#111827;font-size:7px;font-weight:900;line-height:1.05;text-align:center;z-index:3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.res{min-height:24px;font-size:13px;font-weight:900;margin-top:8px}.segs{text-align:left;margin-top:8px;font-size:11px;line-height:1.35}.seg{display:flex;align-items:center;gap:5px;border-top:1px solid #cbd5e1;padding:3px 0}.sw{width:10px;height:10px;border-radius:999px;border:1px solid #334155;flex:0 0 auto}.result{text-align:center;font-weight:900;margin:12px 0}.primary{width:100%;border:0;border-radius:14px;padding:12px;background:#facc15;color:#111827;font-weight:900}.infoBody{font-size:13px;line-height:1.5}.infoBody h3{margin:10px 0 5px}.infoMove{border-top:1px solid #cbd5e1;padding:6px 0}.locked .benchBtn,.locked .node,.locked .fig,.locked .reset{pointer-events:none}@media(max-width:480px){.slot{width:49px}.benchBtn{width:49px;height:49px;font-size:8px}.fig{width:46px;height:46px;font-size:8px}.wwrap{width:170px}.wlabel{font-size:7px;width:62px;margin-left:-31px}.actions{grid-template-columns:64px 1fr 92px}.ai{font-size:15px}}</style></head><body><header><div><h1>コマスター</h1><div class=sub>状態異常修正版</div></div><button id=reset class=reset>リセット</button></header><main class=app><div id=status class=status></div><section class=field><div class=scorebar><div class='score p2'><span>相手AI</span><span>100</span></div><div class=turn>TURN<br><span id=turnCount>1</span></div><div class='score p1'><span>自分</span><span>100</span></div></div><div id=topBench class=bench></div><div id=board class=board></div><div id=bottomBench class=bench></div><div class=pcRows><div class=pcBox><div class=pcTitle>相手PC</div><div id=p2pc class=chips></div></div><div class=pcBox><div class=pcTitle>自分PC</div><div id=p1pc class=chips></div></div></div><div class=actions><button class='action surrender' disabled>投了</button><button id=skipAction class='action ability' disabled>特性発動</button><button id=aiBtn class='action ai'>AI ON</button></div><div class=hint>長押しで技確認。眠りは味方が隣でタッチすると回復します。眠り状態の相手とはバトルできません。バトル表示は上が相手、下が自分です。</div></section><div id=log class=log></div></main><div id=ro class=overlay><div class=box><div class=title>バトルルーレット</div><div class=battleStack><div class=card><div id=tn class=name></div><div class=wwrap><div class=pointer></div><div id=tw class=wheel></div></div><div id=tr class=res></div><div id=ts class=segs></div></div><div class=card><div id=bn class=name></div><div class=wwrap><div class=pointer></div><div id=bw class=wheel></div></div><div id=brr class=res></div><div id=bs class=segs></div></div></div><div id=br class=result>ルーレット回転中...</div><button id=cont class=primary style=display:none>続ける</button></div></div><div id=info class=overlay><div class=box><div class=title id=infoTitle>フィギュア情報</div><div id=infoBody class=infoBody></div><button id=infoClose class=primary>閉じる</button></div></div><script>const NODES={ot1:[18,20],ot2:[28.5,20],ot3:[39,20],ot4:[50,20],ot5:[61,20],ot6:[71.5,20],ot7:[82,20],ol2:[18,34],ol3:[18,48],ol4:[18,62],or2:[82,34],or3:[82,48],or4:[82,62],it1:[34,34],it2:[50,34],it3:[66,34],im1:[34,48],im3:[66,48],ib1:[34,62],ib2:[50,62],ib3:[66,62],ob1:[18,76],ob2:[28.5,76],ob3:[39,76],ob4:[50,76],ob5:[61,76],ob6:[71.5,76],ob7:[82,76]};const EDGES=[['ot1','ot2'],['ot2','ot3'],['ot3','ot4'],['ot4','ot5'],['ot5','ot6'],['ot6','ot7'],['ot1','ol2'],['ol2','ol3'],['ol3','ol4'],['ol4','ob1'],['ot7','or2'],['or2','or3'],['or3','or4'],['or4','ob7'],['ob1','ob2'],['ob2','ob3'],['ob3','ob4'],['ob4','ob5'],['ob5','ob6'],['ob6','ob7'],['it1','it2'],['it2','it3'],['it1','im1'],['im1','ib1'],['it3','im3'],['im3','ib3'],['ib1','ib2'],['ib2','ib3'],['ot1','it1'],['ot7','it3'],['ob1','ib1'],['ob7','ib3'],['ot3','it2'],['ob5','ib2']];const SPAWN={p1:['ob1','ob7'],p2:['ot1','ot7']},TARGET={p1:'ot4',p2:'ob4'},CORNERS={p1:['ot1','ot7'],p2:['ob1','ob7']};function M(c,n,d,s,e){return{c,n,d,s,e:e||null}}const F={pikachu:{n:'ピカチュウ',mp:2,r:'R',w:[M('gold','でんこうせっか',50,20),M('white','かみなり',100,12),M('purple','でんじは',2,20,{condition:'paralyze'}),M('white','でんきショック',30,40),M('miss','ミス',0,4)]},charmander:{n:'ヒトカゲ',mp:3,r:'UC',w:[M('white','ほのおのしっぽ',40,24),M('purple','えんまく',1,28,{wait:1}),M('white','ひっかく',10,32),M('miss','ミス',0,12)]},squirtle:{n:'ゼニガメ',mp:3,r:'UC',w:[M('miss','ミス',0,12),M('white','あわ',30,44),M('blue','からにこもる',0,40,{selfWait:1})]},bulbasaur:{n:'フシギダネ',mp:3,r:'UC',w:[M('purple','どくのこな',1,24,{condition:'poison'}),M('white','タネばくだん',50,20),M('purple','ねむりごな',1,24,{condition:'sleep'}),M('miss','ミス',0,28)]},eevee:{n:'イーブイ',mp:3,r:'R',w:[M('blue','かわす',0,8),M('white','たいあたり',30,24),M('white','きあいだめ',0,28,{focus:true,noKo:true,boost:2}),M('gold','でんこうせっか',20,16),M('blue','かわす',0,12),M('miss','ミス',0,8)]},meowth:{n:'ニャース',mp:2,r:'R',w:[M('purple','ねこだまし',3,32,{swap:true}),M('white','ひっかく',40,36),M('blue','かわす',0,20),M('miss','ミス',0,8)]},charizard:{n:'リザードン',mp:2,r:'EX',w:[M('miss','ミス',0,8),M('white','ほのおのうず',60,56,{chain:true}),M('miss','ミス',0,4),M('white','ドラゴンテール',100,28,{bench:true})]},machop:{n:'ワンリキー',mp:2,r:'C',w:[M('miss','ミス',0,8),M('white','きあいパンチ',40,56),M('miss','ミス',0,4),M('blue','かわす',0,28)]},psyduck:{n:'コダック',mp:2,r:'UC',w:[M('white','みずのはどう',60,24,{condition:'confuse'}),M('white','ちょうねんりき',40,32),M('purple','かなしばり',2,28,{wait:1}),M('miss','ミス',0,12)]},dratini:{n:'ミニリュウ',mp:2,r:'R',w:[M('white','りゅうのいかり',80,20),M('purple','つきとばす',2,24,{bench:true}),M('miss','ミス',0,8),M('white','フリーズテール',30,44,{condition:'frozen'})]},kabuto:{n:'カブト',mp:2,r:'UC',w:[M('miss','ミス',0,4),M('blue','まもる',0,16,{selfWait:1}),M('white','マッドショット',40,40,{mpMinus:1}),M('blue','まもる',0,16,{selfWait:1}),M('gold','アクアジェット',30,20)]},geodude:{n:'イシツブテ',mp:2,r:'C',w:[M('purple','じばく',3,24,{selfko:true}),M('white','ころがる',30,40,{chain:true}),M('white','いわおとし',40,24),M('miss','ミス',0,8)]}};const DECKS={p1:['pikachu','charmander','squirtle','bulbasaur','eevee','meowth'],p2:['charizard','machop','psyduck','dratini','kabuto','geodude']};let seq=1,s,aiEnabled=true,aiTimer=null;const $=q=>document.querySelector(q);function turnLabel(id){return id==='p1'?'プレイヤー1':'AI'}function other(p){return p==='p1'?'p2':'p1'}function neigh(id){return EDGES.filter(e=>e[0]===id||e[1]===id).map(e=>e[0]===id?e[1]:e[0])}function freshStatus(){return{condition:null,mpMinus:0}}function piece(fig,owner){return{id:owner+'-'+seq++,owner,fig,n:F[fig].n,mp:F[fig].mp,pos:null,wait:0,status:freshStatus(),focusGuard:false}}function player(id){return{bench:DECKS[id].map(t=>piece(t,id)),field:[],pc:[]}}function all(){return[...s.p1.field,...s.p2.field]}function at(node){return all().find(p=>p.pos===node)}function byid(id){return[...s.p1.bench,...s.p2.bench,...s.p1.field,...s.p2.field,...s.p1.pc,...s.p2.pc].find(p=>p.id===id)}function addlog(t){s.log.unshift(t)}function clear(){s.sel=null;s.reach=[];s.attack=[]}function init(){seq=1;s={p1:player('p1'),p2:player('p2'),turn:'p1',sel:null,reach:[],attack:[],pending:null,win:null,locked:false,turnCount:1,log:['ゲーム開始。状態異常ルールを更新しました。']};checkWaitWin();render()}function canAct(p){return p.wait<=0&&p.status.condition!=='sleep'&&p.status.condition!=='frozen'}function isPassThrough(p){return p.status.condition==='sleep'}function futureMp(p){return Math.max(0,p.mp-(p.status.mpMinus||0))}function effectiveMp(p){if(!canAct(p))return 0;return Math.max(0,futureMp(p)-(s.turnCount===1&&s.turn==='p1'?1:0))}function occupiedAll(){return new Set(all().map(p=>p.pos))}function moveBlockedExcept(self){return new Set(all().filter(p=>p!==self&&!isPassThrough(p)).map(p=>p.pos))}function reachableMap(start,mp,blocked){const vis=new Map([[start,0]]),q=[start];while(q.length){const c=q.shift(),d=vis.get(c);if(d>=mp)continue;for(const n of neigh(c)){if(blocked.has(n)||vis.has(n))continue;vis.set(n,d+1);q.push(n)}}return vis}function reachableFrom(start,mp,blocked){const vis=reachableMap(start,mp,blocked);vis.delete(start);return[...vis.keys()]}function reachableMove(p){const stops=occupiedAll();stops.delete(p.pos);return reachableFrom(p.pos,effectiveMp(p),moveBlockedExcept(p)).filter(n=>!stops.has(n))}function adjacentEnemies(p){return all().filter(o=>o.owner!==p.owner&&p.pos&&neigh(p.pos).includes(o.pos))}function entryTargets(p){return entryTargetsForPlayer(p,s.turn)}function entryTargetsForPlayer(p,playerId){const total=Math.max(0,p.mp-(s.turnCount===1&&playerId==='p1'?1:0));if(total<=0||p.wait>0)return[];const r=new Set(),stops=occupiedAll(),passBlock=new Set(all().filter(o=>!isPassThrough(o)).map(o=>o.pos));for(const sp of SPAWN[playerId]){if(at(sp))continue;r.add(sp);for(const n of reachableFrom(sp,total-1,passBlock))if bled)setTimeout(()=>{if($('#ro').style.display==='flex')btn.click()},850)},1650)}function shortestDist(from,to){if(from===to)return 0;const vis=new Map([[from,0]]),q=[from];while(q.length){const c=q.shift(),d=vis.get(c);for(const n of neigh(c)){if(vis.has(n))continue;if(n===to)return d+1;vis.set(n,d+1);q.push(n)}}return 99}function segProbList(p){const w=wheelFor(p),total=w.reduce((a,b)=>a+b.s,0);return w.map(x=>({seg:cloneSeg(x),prob:x.s/total}))}function battleScore(a,d){let score=0;for(const A of segProbList(a))for(const D of segProbList(d)){const o=compare(A.seg,D.seg,a,d),p=A.prob*D.prob;if(o.blue)score+=0;else if(o.winner==='atk')score+=p*(o.ko?140:42);else if(o.winner==='def')score-=p*(o.ko?155:38)}return score+(F[a.fig].r==='EX'?12:0)-(F[d.fig].r==='EX'?8:0)}function activeMp(p){return canAct(p)?futureMp(p):0}function mpCornerThreat(p,owner,node=p.pos){return p&&activeMp(p)>=3&&CORNERS[owner].includes(node)&&activeMp(p)>=shortestDist(node,TARGET[owner])}function nextWinThreatFor(owner){for(const p of s[owner].field){if(!canAct(p)||!p.pos)continue;if(reachableMove(p).includes(TARGET[owner]))return 100000;if(activeMp(p)>=shortestDist(p.pos,TARGET[owner]))return mpCornerThreat(p,owner)?22000:7000}for(const p of s[owner].bench){if(entryTargetsForPlayer(p,owner).includes(TARGET[owner]))return 100000;for(const n of entryTargetsForPlayer(p,owner))if(p.mp>=shortestDist(n,TARGET[owner]))return mpCornerThreat(p,owner,n)?18000:5000}return 0}function defensePressure(owner){const enemy=other(owner),goal=TARGET[enemy];let v=0;for(const e of s[enemy].field){const d=shortestDist(e.pos,goal);if(d<=1)v+=2200;else if(d<=2)v+=900;if(activeMp(e)>=d)v+=2200}const th=nextWinThreatFor(enemy);if(th>=100000)v+=7000;else if(th>0)v+=1100;return v}function entryPointScore(owner,node){const enemy=other(owner);let sc=0;if(SPAWN[owner].includes(node)){const pressure=defensePressure(owner);sc+=pressure>1800?Math.min(2200,600+pressure*.18):-900}if(SPAWN[enemy].includes(node)){const ready=s[enemy].bench.filter(p=>p.wait<=0).length;sc+=260+s[enemy].pc.length*430+ready*45;if(nextWinThreatFor(owner)>0)sc+=420}return sc}function boardEval(owner){const enemy=other(owner);let v=0;for(const p of s[owner].field){v+=80-shortestDist(p.pos,TARGET[owner])*14;if(mpCornerThreat(p,owner))v+=9000;if(['it1','it2','it3','im1','im3','ib1','ib2','ib3'].includes(p.pos))v+=160;v+=entryPointScore(owner,p.pos)}for(const p of s[enemy].field){v-=70-shortestDist(p.pos,TARGET[enemy])*12;if(mpCornerThreat(p,enemy))v-=9500;v-=entryPointScore(enemy,p.pos)}v+=s[enemy].pc.length*500-s[owner].pc.length*520;v+=s[owner].field.length*90-s[enemy].field.length*90;return v}function surroundGainForMove(p,node){const old=p.pos;p.pos=node;let gain=0;for(const e of s[other(p.owner)].field){const ns=neigh(e.pos);if(ns.length&&ns.every(n=>{const o=at(n);return o&&o.owner===p.owner}))gain+=2200}p.pos=old;return gain}function dangerAt(p,node){const old=p.pos;p.pos=node;let risk=0;for(const e of s[other(p.owner)].field)if(e.status.condition!=='sleep'&&neigh(e.pos).includes(node))risk=Math.max(risk,battleScore(e,p));p.pos=old;return Math.max(0,risk)*12}function genPlans(owner){let plans=[];for(const p of s[owner].field){if(canWakeByAlly(p))plans.push({type:'wake',p});if(!canAct(p))continue;for(const e of adjacentEnemies(p).filter(x=>x.status.condition!=='sleep'))plans.push({type:'battle',p,d:e});for(const n of reachableMove(p))plans.push({type:'move',p,n})}for(const p of s[owner].bench)for(const n of entryTargetsForPlayer(p,owner))plans.push({type:'deploy',p,n});return plans}function withPlan(plan,fn){if(plan.type==='move'){const old=plan.p.pos;plan.p.pos=plan.n;const r=fn();plan.p.pos=old;return r}if(plan.type==='deploy'){const pl=s[plan.p.owner],oldPos=plan.p.pos;pl.bench=pl.bench.filter(x=>x.id!==plan.p.id);pl.field.push(plan.p);plan.p.pos=plan.n;const r=fn();pl.field=pl.field.filter(x=>x.id!==plan.p.id);pl.bench.push(plan.p);plan.p.pos=oldPos;return r}return fn()}function planBaseScore(plan,owner){const enemy=other(owner);if(plan.type==='wake')return 2500;if((plan.type==='move'||plan.type==='deploy')&&plan.n===TARGET[owner])return 999999;if(plan.type==='battle'){let sc=battleScore(plan.p,plan.d)+450;if(mpCornerThreat(plan.d,enemy))sc+=7000;if(reachableMove(plan.d).includes(TARGET[enemy]))sc+=15000;return sc}return withPlan(plan,()=>{let sc=boardEval(owner);if(mpCornerThreat(plan.p,owner,plan.p.pos))sc+=18000;if(activeMp(plan.p)>=shortestDist(plan.p.pos,TARGET[owner]))sc+=6000;sc+=surroundGainForMove(plan.p,plan.p.pos);sc-=dangerAt(plan.p,plan.p.pos);const myThreat=nextWinThreatFor(owner),enemyThreat=nextWinThreatFor(enemy);sc+=myThreat*.7;sc-=enemyThreat*.9;return sc})}function scorePlan(plan,owner){let base=planBaseScore(plan,owner);if(base>900000)return base;return withPlan(plan,()=>{const enemy=other(owner),myWin=nextWinThreatFor(owner),enemyWin=nextWinThreatFor(enemy);if(myWin>=100000)return base+90000;if(enemyWin>=100000&&myWin<100000)base-=85000;if(myWin>enemyWin)base+=12000;let oppBest=-999999;for(const op of genPlans(enemy)){oppBest=Math.max(oppBest,planBaseScore(op,enemy));if(oppBest>900000)break}return base-oppBest*.62})}function chooseAiPlan(){const plans=genPlans('p2');let best=null;for(const p of plans){const sc=scorePlan(p,'p2');if(!best||sc>best.score)best={...p,score:sc}}return best}function aiTurn(){if(!aiEnabled||s.turn!=='p2'||s.win||s.locked||s.pending)return;const plan=chooseAiPlan();if(!plan){addlog('AIは動けません。');end();render();return}if(plan.type==='wake'){wake(plan.p);end();render();return}if(plan.type==='deploy'){s.sel={type:'bench',id:plan.p.id};addlog('AI思考: '+plan.p.n+'を出撃。評価 '+Math.round(plan.score));deploy(plan.n);return}if(plan.type==='battle'){s.pending={phase:'battle',a:plan.p.id,d:plan.d.id};addlog('AI思考: '+plan.p.n+'で'+plan.d.n+'にバトル。評価 '+Math.round(plan.score));startBattle();return}if(plan.type==='move'){s.sel={type:'field',id:plan.p.id};plan.p.pos=plan.n;addlog('AI思考: '+plan.p.n+'が移動。評価 '+Math.round(plan.score));afterMove(plan.p);return}}function aiChooseEnemy(){if(!s.pending||s.pending.phase!=='chooseEnemy'||s.turn!=='p2')return;const a=byid(s.pending.a);let best=null;for(const e of adjacentEnemies(a).filter(x=>x.status.condition!=='sleep')){const sc=battleScore(a,e)+(mpCornerThreat(e,'p1')?9000:0);if(!best||sc>best.sc)best={e,sc}}if(best&&best.sc>-35){addlog('AIは'+best.e.n+'にバトルを仕掛けます。');startBattleWith(best.e.id)}else{addlog('AIはバトルしないを選びました。');end();render()}}function scheduleAi(){clearTimeout(aiTimer);if(aiEnabled&&s.turn==='p2'&&!s.win&&!s.locked&&!s.pending)aiTimer=setTimeout(aiTurn,650)}function statusMarks(p){let m='';if(p.wait>0)m+='待';if(p.status.condition==='paralyze')m+='麻';if(p.status.condition==='poison')m+='毒';if(p.status.condition==='toxic')m+='猛';if(p.status.condition==='sleep')m+='眠';if(p.status.condition==='frozen')m+='氷';if(p.status.condition==='burn')m+='火';if(p.status.condition==='confuse')m+='混';if(p.status.mpMinus)m+='M-';return m}function showPieceInfo(p){const data=F[p.fig];$('#infoTitle').textContent=p.n+' の情報';$('#infoBody').innerHTML='<p><b>所有:</b> '+turnLabel(p.owner)+' / <b>MP:</b> '+p.mp+' / <b>レア:</b> '+data.r+'</p><p><b>現在位置:</b> '+(p.pos||'ベンチ')+' / <b>状態:</b> '+(statusMarks(p)||'なし')+'</p><h3>技</h3>'+segList(wheelFor(p),p)+'<h3>状態メモ</h3><p>どく:-20 / どくどく:-40 / マヒ:最小幅技がミス / こんらん:技が隣にずれる / ねむり:行動不能・通過可・味方タッチで回復・バトル不可</p>';$('#info').style.display='flex'}function bindLongPress(el,p){let t=null;const open=e=>{e.preventDefault();e.stopPropagation();showPieceInfo(p)};el.oncontextmenu=open;el.addEventListener('pointerdown',e=>{t=setTimeout(()=>open(e),560)});['pointerup','pointercancel','pointerleave','pointermove'].forEach(ev=>el.addEventListener(ev,()=>{if(t)clearTimeout(t)}))}function render(){document.body.classList.toggle('locked',s.locked);$('#turnCount').textContent=s.turnCount;renderStatus();renderBoard();renderBenches();renderPc();renderActions();$('#log').textContent=s.log.slice(0,18).join('\n');scheduleAi()}function renderStatus(){const selected=s.sel?byid(s.sel.id):null;$('#status').textContent=s.win?turnLabel(s.win)+'の勝利です！':s.locked?'バトル中...':s.pending&&s.pending.phase==='chooseEnemy'?'隣接敵を選択中 / バトルしないも選べます':s.turn==='p2'?'AI思考中...':selected?turnLabel(s.turn)+'のターン / 選択中: '+selected.n:turnLabel(s.turn)+'のターン / 駒を選択'}function renderActions(){const b=$('#skipAction');if(s.pending&&s.pending.phase==='chooseEnemy'&&s.turn==='p1'){b.disabled=false;b.textContent='バトルしない'}else{b.disabled=true;b.textContent='特性発動'}$('#aiBtn').textContent=aiEnabled?'AI ON':'AI OFF'}function renderBoard(){const b=$('#board');b.innerHTML='';let svg='<svg class=lines viewBox=0 0 100 100 preserveAspectRatio=none>';for(const [a,c] of EDGES)svg+='<line class=edge x1='+NODES[a][0]+' y1='+NODES[a][1]+' x2='+NODES[c][0]+' y2='+NODES[c][1]+' />';svg+='</svg>';b.insertAdjacentHTML('beforeend',svg);for(const id of Object.keys(NODES)){const [x,y]=NODES[id];const bt=document.createElement('button');bt.className='node';if(SPAWN.p1.includes(id)||SPAWN.p2.includes(id))bt.classList.add('spawn');if(id==='ot4'||id==='ob4'){bt.classList.add('goal');if(id==='ob4')bt.classList.add('player')}if(s.reach.includes(id))bt.classList.add('reach');if(s.attack.includes(id))bt.classList.add('attack');bt.style.left=x+'%';bt.style.top=y+'%';bt.textContent=id==='ot4'?'◀':id==='ob4'?'▶':(SPAWN.p1.includes(id)||SPAWN.p2.includes(id))?'◎':'';bt.onclick=()=>clickNode(id);b.append(bt)}for(const p of all()){const [x,y]=NODES[p.pos];const el=document.createElement('div');el.className='fig '+p.owner+(s.sel&&s.sel.id===p.id?' sel':'')+(s.attack.includes(p.pos)?' attackable':'')+(!canAct(p)?' waiting':'');el.style.left=x+'%';el.style.top=y+'%';el.innerHTML='<span>'+p.n+'</span><span class=mp>'+effectiveMp(p)+'</span>'+(statusMarks(p)?'<span class=mark>'+statusMarks(p)+'</span>':'');el.onclick=()=>clickFigure(p);bindLongPress(el,p);b.append(el)}}function renderBenchRow(elId,owner){const row=$(elId);row.innerHTML='';for(const p of s[owner].bench){const slot=document.createElement('div');slot.className='slot';const btn=document.createElement('button');btn.className='benchBtn'+(s.sel&&s.sel.id===p.id?' active':'');btn.disabled=owner!==s.turn||s.turn!=='p1'||p.wait>0||!!s.win||s.locked||!!s.pending;btn.textContent=p.n;btn.onclick=()=>selectBench(p.id);bindLongPress(btn,p);const meta=document.createElement('div');meta.className='meta';meta.textContent='MP '+p.mp+(p.wait?' / 待機':'');slot.append(btn,meta);row.append(slot)}}function renderBenches(){renderBenchRow('#topBench','p2');renderBenchRow('#bottomBench','p1')}function renderPc(){for(const id of ['p1','p2']){const box=$('#'+id+'pc');box.innerHTML='';for(const p of s[id].pc){const chip=document.createElement('span');chip.textContent=p.n;box.append(chip)}}}$('#reset').onclick=init;$('#skipAction').onclick=()=>{if(s.pending&&s.pending.phase==='chooseEnemy'&&s.turn==='p1'){addlog('バトルしないを選びました。');end();render()}};$('#aiBtn').onclick=()=>{aiEnabled=!aiEnabled;addlog(aiEnabled?'AIをONにしました。':'AIをOFFにしました。');render()};$('#infoClose').onclick=()=>$('#info').style.display='none';init();</script></body></html>
