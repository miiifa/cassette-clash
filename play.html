ze:10px;margin-top:3px;color:#f8fafc;text-shadow:0 1px 2px #000}.board{position:relative;aspect-ratio:100/92;width:100%;max-width:660px;margin:0 auto}.lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;filter:drop-shadow(0 1px 2px #000c)}.edge{stroke:#f8fafc;stroke-width:3.8;stroke-linecap:round}.node{position:absolute;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:999px;background:#fff;border:2px solid #e5e7eb;box-shadow:0 0 5px #fff;z-index:2}.node.spawn{width:30px;height:30px;border-width:3px;background:radial-gradient(circle,#fff 0 28%,#dbeafe 29% 58%,#475569 59%)}.node.goal{width:40px;height:40px;border-width:4px;background:radial-gradient(circle,#fef3c7,#f59e0b 60%,#92400e);display:grid;place-items:center;color:#fff;font-weight:900;box-shadow:0 0 18px #f59e0b}.node.goal.player{background:radial-gradient(circle,#ecfeff,#38bdf8 60%,#075985);box-shadow:0 0 18px #38bdf8}.node.reach{outline:4px solid #60a5fa;outline-offset:3px}.node.attack{outline:4px solid #fb7185;outline-offset:3px}.fig{position:absolute;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:999px;border:4px solid #cbd5e1;display:grid;place-items:center;text-align:center;padding:4px;color:#fff;line-height:1.02;font-size:9px;font-weight:900;box-shadow:0 10px 18px #0008,inset 0 -7px 10px #0005;z-index:4}.fig.p1{background:linear-gradient(#60a5fa,#2563eb)}.fig.p2{background:linear-gradient(#fb7185,#dc2626)}.fig.sel{outline:5px solid #facc15}.fig.attackable{outline:5px solid #fb7185;cursor:pointer}.fig.waiting{filter:grayscale(.55);opacity:.75}.mp{position:absolute;right:-3px;bottom:-3px;min-width:21px;height:21px;border-radius:999px;background:#0ea5e9;color:#fff;border:2px solid #fff;display:grid;place-items:center;font-size:12px}.mark{position:absolute;left:-6px;top:-6px;border-radius:999px;background:#111827cc;color:#fff;border:1px solid #fff;padding:2px 4px;font-size:9px}.pcRows{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:8px}.pcBox{background:#f8fafc;color:#111827;border-radius:12px;padding:8px}.pcTitle{font-size:12px;font-weight:900;margin-bottom:5px}.chips{display:flex;gap:6px;flex-wrap:wrap;min-height:28px}.chips span{border-radius:999px;background:#e5e7eb;padding:4px 8px;font-size:11px;color:#111827;font-weight:900}.actions{display:grid;grid-template-columns:72px 1fr 110px;gap:8px;margin-top:10px}.action{border:0;border-radius:12px;padding:12px 8px;font-weight:900}.surrender{background:#1e3a8a;color:#fff}.ability{background:#1d4ed8;color:#fff}.ai{background:linear-gradient(#fde047,#eab308);color:#111827;font-size:28px;letter-spacing:6px}.hint{background:#f8fafccc;color:#111827;border-radius:12px;padding:8px;font-size:12px;line-height:1.45;margin-top:8px}.log{background:#020617;color:#e5e7eb;border-radius:16px;padding:12px;min-height:96px;white-space:pre-wrap;font:12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;line-height:1.45}.overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:14px;z-index:50;background:#000b}.rbox{width:min(720px,100%);max-height:92vh;overflow:auto;background:#f8fafc;color:#111827;border-radius:22px;padding:14px;box-shadow:0 22px 60px #000b}.rtitle{font-weight:900;font-size:18px;text-align:center;margin-bottom:10px}.wheels{display:grid;grid-template-columns:1fr 1fr;gap:10px}.wcard{background:#e5e7eb;border-radius:18px;padding:10px;text-align:center}.wname{font-weight:900;margin-bottom:8px}.wwrap{position:relative;width:min(36vw,180px);aspect-ratio:1;margin:auto}.pointer{position:absolute;left:50%;top:-4px;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:18px solid #111827;z-index:5}.wheel{position:absolute;inset:0;border-radius:999px;border:8px solid #111827;transition:transform 1.45s cubic-bezier(.12,.8,.18,1);box-shadow:inset 0 0 0 4px #fff,0 8px 18px #0004;overflow:hidden}.wheel:after{content:"";position:absolute;inset:38%;bord <body>
<header><div><h1>コマスター</h1><div class="sub">状態異常・包囲KO版</div></div><button id="reset" class="reset">リセット</button></header>
<main class="app"><div id="status" class="status"></div><section class="field"><div class="scorebar"><div class="score p2"><span>相手</span><span>100</span></div><div class="turnbox">TURN<br><span id="turnCount">1</span></div><div class="score p1"><span>自分</span><span>100</span></div></div><div id="topBench" class="bench"></div><div id="board" class="board"></div><div id="bottomBench" class="bench"></div><div class="pcRows"><div class="pcBox"><div class="pcTitle">相手PC</div><div id="p2pc" class="chips"></div></div><div class="pcBox"><div class="pcTitle">自分PC</div><div id="p1pc" class="chips"></div></div></div><div class="actions"><button class="action surrender" disabled>投了</button><button class="action ability" disabled>特性発動</button><button class="action ai" disabled>AI</button></div><div class="hint">紫技は効果を適用します。どく/マヒ/ねむり/ウェイト/ベンチ送り/入れ替え/自爆など。移動・出撃・バトル・特殊効果の後に包囲KOをチェックします。</div></section><div id="log" class="log"></div></main>
<div id="ro" class="overlay"><div class="rbox"><div class="rtitle">バトルルーレット</div><div class="wheels"><div class="wcard"><div id="an" class="wname"></div><div class="wwrap"><div class="pointer"></div><div id="aw" class="wheel"></div></div><div id="ar" class="wres"></div><div id="as" class="segs"></div></div><div class="wcard"><div id="dn" class="wname"></div><div class="wwrap"><div class="pointer"></div><div id="dw" class="wheel"></div></div><div id="dr" class="wres"></div><div id="ds" class="segs"></div></div></div><div id="br" class="result">ルーレット回転中...</div><button id="cont" class="continue">続ける</button></div></div>
<script>
const NODES={ot1:[18,20],ot2:[28.5,20],ot3:[39,20],ot4:[50,20],ot5:[61,20],ot6:[71.5,20],ot7:[82,20],ol2:[18,34],ol3:[18,48],ol4:[18,62],or2:[82,34],or3:[82,48],or4:[82,62],it1:[34,34],it2:[50,34],it3:[66,34],im1:[34,48],im3:[66,48],ib1:[34,62],ib2:[50,62],ib3:[66,62],ob1:[18,76],ob2:[28.5,76],ob3:[39,76],ob4:[50,76],ob5:[61,76],ob6:[71.5,76],ob7:[82,76]};
const EDGES=[['ot1','ot2'],['ot2','ot3'],['ot3','ot4'],['ot4','ot5'],['ot5','ot6'],['ot6','ot7'],['ot1','ol2'],['ol2','ol3'],['ol3','ol4'],['ol4','ob1'],['ot7','or2'],['or2','or3'],['or3','or4'],['or4','ob7'],['ob1','ob2'],['ob2','ob3'],['ob3','ob4'],['ob4','ob5'],['ob5','ob6'],['ob6','ob7'],['it1','it2'],['it2','it3'],['it1','im1'],['im1','ib1'],['it3','im3'],['im3','ib3'],['ib1','ib2'],['ib2','ib3'],['ot1','it1'],['ot7','it3'],['ob1','ib1'],['ob7','ib3'],['ot3','it2'],['ob5','ib2']];
const SPAWN={p1:['ob1','ob7'],p2:['ot1','ot7']},TARGET={p1:'ot4',p2:'ob4'};
const F={
 pikachu:{n:'ピカチュウ',mp:2,r:'R',w:[['gold','でんこうせっか',50,20],['white','かみなり',100,12],['purple','でんじは',2,20,'paralyze'],['white','でんきショック',30,40],['miss','ミス',0,4]]},
 charmander:{n:'ヒトカゲ',mp:3,r:'UC',w:[['white','ほのおのしっぽ',40,24],['purple','えんまく',1,28,'wait'],['white','ひっかく',10,32],['miss','ミス',0,12]]},
 squirtle:{n:'ゼニガメ',mp:3,r:'UC',w:[['miss','ミス',0,12],['white','あわ',30,44],['blue','からにこもる',0,40,'selfWait']]},
 bulbasaur:{n:'フシギダネ',mp:3,r:'UC',w:[['purple','どくのこな',1,24,'poison'],['white','タネばくだん',50,20],['purple','ねむりごな',1,24,'sleep'],['miss','ミス',0,28]]},
 eevee:{n:'イーブイ',mp:3,r:'R',w:[['blue','かわす',0,8],['white','たいあたり',30,24],['white','きあいだめ',0,28],['gold','でんこうせっか',20,16],['blue','かわす',0,12],['miss','ミス',0,8]]},
 meowth:{n:'ニャース',mp:2,r:'R',w:[['purple','ねこだまし',3,32,'swap'],['white','ひっかく',40,36],['blue','かわす',0,20],['miss','ミス',0,8]]},
 charizard:{n:'リザードン',mp:2,r:'EX',w:[['miss','ミス',0,8],['white','ほのおのうず',60,56],['miss','ミス',0,4],['white','ドラゴンテール',100,28,'bench']]},
 machop:{n:'ワンリキー',mp:2,r:'C',w:[['miss','ミス',0,8],['white','きあいパンチ',40,56],['miss','ミス',0,4],['blue','かわす',0,28]]},
 psyduck:{n:'コダック',mp:2,r:'UC',w:[['white','みずのはどう',60,24],['white','ちょうねんりき',40,32],['purple','かなしばり',2,28,'wait'],['miss','ミス',0,12]]},
 dratini:{n:'ミニリュウ',mp:2,r:'R',w:[['white','りゅうのいかり',80,20],['purple','つきとばす',2,24,'bench'],['miss','ミス',0,8],['white','フリーズテール',30,44]]},
 kabuto:{n:'カブト',mp:2,r:'UC',w:[['miss','ミス',0,4],['blue','まもる',0,16,'selfWait'],['white','マッドショット',40,40,'mpMinus'],['blue','まもる',0,16],['gold','アクアジェット',30,20]]},
 geodude:{n:'イシツブテ',mp:2,r:'C',w:[['purple','じばく',3,24,'selfko'],['white','ころがる',30,40],['white','いわおとし',40,24],['miss','ミス',0,8]]}
};
const DECKS={p1:['pikachu','charmander','squirtle','bulbasaur','eevee','meowth'],p2:['charizard','machop','psyduck','dratini','kabuto','geodude']};
let seq=1,s;const $=q=>document.querySelector(q);function turnLabel(id){return id==='p1'?'プレイヤー1':'プレイヤー2'}function other(p){return p==='p1'?'p2':'p1'}function neigh(id){return EDGES.filter(e=>e[0]===id||e[1]===id).map(e=>e[0]===id?e[1]:e[0])}function freshStatus(){return{paralyze:false,poison:0,sleep:false,frozen:false,mpMinus:0}}function piece(fig,owner){return{id:owner+'-'+seq++,owner,fig,n:F[fig].n,mp:F[fig].mp,pos:null,wait:0,status:freshStatus()}}function player(id){return{bench:DECKS[id].map(t=>piece(t,id)),field:[],pc:[]}}function all(){return[...s.p1.field,...s.p2.field]}function at(node){return all().find(p=>p.pos===node)}function byid(id){return[...s.p1.bench,...s.p2.bench,...s.p1.field,...s.p2.field,...s.p1.pc,...s.p2.pc].find(p=>p.id===id)}function addlog(t){s.log.unshift(t)}function clear(){s.sel=null;s.reach=[];s.attack=[]}
function init(){seq=1;s={p1:player('p1'),p2:player('p2'),turn:'p1',sel:null,reach:[],attack:[],win:null,locked:false,turnCount:1,log:['ゲーム開始。紫技の効果と包囲KOを適用します。']};checkWaitWin();render()}
function canAct(p){return p.wait<=0&&!p.status.sleep&&!p.status.frozen}function effectiveMp(p){if(!canAct(p))return 0;return Math.max(0,p.mp-(p.status.mpMinus||0)-(s.turnCount===1&&s.turn==='p1'?1:0))}function occupiedExcept(target){return new Set(all().filter(p=>p.pos!==target).map(p=>p.pos))}function reachableFrom(start,mp,blocked){const vis=new Map([[start,0]]),q=[start];while(q.length){const c=q.shift(),d=vis.get(c);if(d>=mp)continue;for(const n of neigh(c)){if(blocked.has(n)||vis.has(n))continue;vis.set(n,d+1);q.push(n)}}vis.delete(start);return[...vis.keys()]}function reachableMove(p){return reachableFrom(p.pos,effectiveMp(p),occupiedExcept(null))}function canReachTarget(p,target){return reachableFrom(p.pos,effectiveMp(p),occupiedExcept(target)).includes(target)}
function entryTargets(p){const total=Math.max(0,p.mp-(s.turnCount===1&&s.turn==='p1'?1:0));if(total<=0||p.wait>0)return[];const result=new Set();for(const sp of SPAWN[s.turn]){if(at(sp))continue;result.add(sp);for(const n of reachableFrom(sp,total-1,occupiedExcept(null)))result.add(n)}return[...result]}function entryTargetsForPlayer(p,playerId){const total=Math.max(0,p.mp-(s.turnCount===1&&playerId==='p1'?1:0));if(total<=0||p.wait>0)return[];const result=new Set();for(const sp of SPAWN[playerId]){if(at(sp))continue;result.add(sp);for(const n of reachableFrom(sp,total-1,occupiedExcept(null)))result.add(n)}return[...result]}function canPieceAct(p){return canAct(p)&&(reachableMove(p).length>0||all().some(o=>o.owner!==p.owner&&canReachTarget(p,o.pos)))}function hasAnyMove(playerId){if(s[playerId].bench.some(p=>entryTargetsForPlayer(p,playerId).length>0))return true;return s[playerId].field.some(canPieceAct)}function checkWaitWin(){if(s.win)return;const current=s.turn;if(!hasAnyMove(current)){s.win=other(current);clear();addlog(turnLabel(current)+'は動けません。'+turnLabel(s.win)+'の勝利です！')}}function tickWait(owner){for(const p of [...s[owner].bench,...s[owner].field])if(p.wait>0)p.wait--}function end(){const prev=s.turn;tickWait(prev);clear();s.turn=other(prev);s.turnCount++;checkWaitWin()}
function addWait(p){p.wait=Math.max(p.wait,p.owner===s.turn?2:1)}function selectBench(id){if(s.win||s.locked)return;const p=s[s.turn].bench.find(x=>x.id===id);if(!p||p.wait>0)return addlog(p?p.n+'は待機中です。':'');const targets=entryTargets(p);if(!targets.length){addlog(p.n+'は今は出撃できません。');return}s.sel={type:'bench',id};s.reach=targets;s.attack=[];addlog(p.n+'を選択。出撃先を選んでください。');render()}function selectField(id){if(s.win||s.locked)return;const p=s[s.turn].field.find(x=>x.id===id);if(!p)return;if(!canAct(p)){addlog(p.n+'は状態異常/ウェイトで動けません。');return}s.sel={type:'field',id};s.reach=reachableMove(p);s.attack=all().filter(o=>o.owner!==p.owner&&canReachTarget(p,o.pos)).map(o=>o.pos);addlog(p.n+'を選択。赤い敵をタップするとバトル。');render()}function clickNode(n){if(s.win||s.locked)return;const target=at(n);if(target&&target.owner===s.turn){selectField(target.id);return}if(!s.sel)return;if(s.sel.type==='bench'&&s.reach.includes(n)){deploy(n);return}if(s.sel.type==='field'&&s.reach.includes(n)&&!target){move(n);return}if(s.sel.type==='field'&&s.attack.includes(n)&&target){battle(target.id);return}}
function clickFigure(p){if(s.win||s.locked)return;if(p.owner===s.turn){selectField(p.id);return}if(s.sel&&s.sel.type==='field'&&s.attack.includes(p.pos)){battle(p.id);return}addlog('先に自分の駒を選んでください。')}function deploy(n){const pl=s[s.turn],p=pl.bench.find(x=>x.id===s.sel.id);pl.bench=pl.bench.filter(x=>x.id!==p.id);p.pos=n;pl.field.push(p);addlog(turnLabel(p.owner)+'の'+p.n+'が出撃しました。');if(n===TARGET[p.owner]){s.win=p.owner;clear();addlog(turnLabel(p.owner)+'の勝利です！');render();return}resolveSurrounds();end();render()}function move(n){const p=byid(s.sel.id);p.pos=n;addlog(turnLabel(p.owner)+'の'+p.n+'が移動しました。');if(n===TARGET[p.owner]){s.win=p.owner;clear();addlog(turnLabel(p.owner)+'の勝利です！');render();return}resolveSurrounds();end();render()}function removeField(p){s[p.owner].field=s[p.owner].field.filter(x=>x.id!==p.id);p.pos=null}function sendToBench(p){removeField(p);p.status=freshStatus();addWait(p);s[p.owner].bench.push(p);addlog(p.n+'はベンチへ戻されました。')}function pc(p){const pl=s[p.owner];removeField(p);p.status=freshStatus();if(pl.pc.length>=2){const out=pl.pc.shift();addWait(out);pl.bench.push(out);addlog(out.n+'がPCからベンチへ戻りました。1ターン待機します。')}pl.pc.push(p);addlog(turnLabel(p.owner)+'の'+p.n+'はPCへ送られました。')}
function resolveSurrounds(){let changed=true;while(changed){changed=false;for(const p of [...all()]){const ns=neigh(p.pos);if(ns.length&&ns.every(n=>{const o=at(n);return o&&o.owner!==p.owner})){addlog(p.n+'は包囲されました。');pc(p);changed=true;break}}}}function spinRaw(w){let total=w.reduce((a,b)=>a+b[3],0),r=Math.random()*total,acc=0;for(const seg of w){const start=acc/total*360;acc+=seg[3];const end=acc/total*360;if((r-=seg[3])<=0)return{seg:[...seg],center:(start+end)/2}}return{seg:[...w[w.length-1]],center:350}}function spinFor(p){const r=spinRaw(F[p.fig].w);if(p.status.paralyze&&(r.seg[0]==='white'||r.seg[0]==='gold')){addlog(p.n+'はマヒで技がミスになりました。');r.seg=['miss','ミス',0,r.seg[3],''];}return r}
function value(seg,p){return (seg[0]==='white'||seg[0]==='gold')?Math.max(0,(seg[2]||0)-(p.status.poison||0)):seg[2]||0}function isKoAttack(seg,p){return (seg[0]==='white'||seg[0]==='gold')&&value(seg,p)>0}function compare(a,b,ap,bp){const A=a[0],B=b[0],av=value(a,ap),bv=value(b,bp);if(A==='miss'&&B==='miss')return{winner:'draw',ko:false};if(A==='miss')return{winner:'def',ko:isKoAttack(b,bp)};if(B==='miss')return{winner:'atk',ko:isKoAttack(a,ap)};if(A==='blue'&&B==='blue')return{winner:'draw',ko:false};if(A==='gold'&&B==='blue')return{winner:'atk',ko:isKoAttack(a,ap)};if(B==='gold'&&A==='blue')return{winner:'def',ko:isKoAttack(b,bp)};if(A==='blue')return{winner:'atk',ko:false};if(B==='blue')return{winner:'def',ko:false};if(A==='gold'&&B==='purple')return{winner:'atk',ko:isKoAttack(a,ap)};if(B==='gold'&&A==='purple')return{winner:'def',ko:isKoAttack(b,bp)};if(A==='purple'||B==='purple'){if(A==='purple'&&B==='purple'){if(av===bv)return{winner:'draw',ko:false};return{winner:av>bv?'atk':'def',ko:false}}return{winner:A==='purple'?'atk':'def',ko:false}}if(av===bv)return{winner:'draw',ko:false};const win=av>bv?'atk':'def';return{winner:win,ko:isKoAttack(win==='atk'?a:b,win==='atk'?ap:bp)}}
function applyEffect(seg,user,target){const e=seg[4];if(!e)return false;if(e==='paralyze'){target.status.paralyze=true;addlog(target.n+'はマヒしました。');return true}if(e==='poison'){target.status.poison=Math.max(target.status.poison,20);addlog(target.n+'はどくになりました。白/金ダメージ-20。');return true}if(e==='sleep'){target.status.sleep=true;addlog(target.n+'はねむりました。');return true}if(e==='freeze'){target.status.frozen=true;addlog(target.n+'はこおりました。');return true}if(e==='wait'){addWait(target);addlog(target.n+'にウェイトがつきました。');return true}if(e==='mpMinus'){target.status.mpMinus=Math.max(target.status.mpMinus,1);addlog(target.n+'にMP-1がつきました。');return true}if(e==='bench'){sendToBench(target);return true}if(e==='swap'){const a=user.pos;user.pos=target.pos;target.pos=a;addlog(user.n+'と'+target.n+'の場所が入れ替わりました。');return true}if(e==='selfWait'){addWait(user);addlog(user.n+'にウェイトがつきました。');return true}if(e==='selfko'){addlog('じばく！両方PCへ送られます。');pc(user);pc(target);return true}return false}
function segText(t,p){if(t[0]==='miss')return t[1];if(t[0]==='blue')return t[1]+' [青]';if(t[0]==='purple')return t[1]+' [紫 ★'+t[2]+']';if(t[0]==='gold')return t[1]+' [金 '+value(t,p)+']';return t[1]+' [白 '+value(t,p)+']'}function colorOf(t){return{miss:'#ef4444',white:'#f8fafc',gold:'#facc15',purple:'#a855f7',blue:'#38bdf8'}[t]||'#fff'}function gradient(w){let total=w.reduce((a,b)=>a+b[3],0),acc=0,parts=[];for(const seg of w){const st=acc/total*360;acc+=seg[3];const en=acc/total*360;parts.push(colorOf(seg[0])+' '+st+'deg '+en+'deg')}return'conic-gradient('+parts.join(',')+')'}function labelHtml(w){let total=w.reduce((a,b)=>a+b[3],0),acc=0,out='';for(const seg of w){const st=acc/total*360;acc+=seg[3];const c=(st+acc/total*360)/2;const name=seg[0]==='miss'?'ミス':seg[1];out+='<span class="wlabel" style="transform:rotate('+c+'deg) translateY(-58px) rotate('+(-c)+'deg)">'+name+'</span>'}return out}function segList(w,p){return w.map(seg=>'<div class="seg"><span class="sw" style="background:'+colorOf(seg[0])+'"></span><span>'+segText(seg,p)+' / '+seg[3]+(seg[4]?' / 効果':'')+'</span></div>').join('')}
function battle(defid){const a=byid(s.sel.id),d=byid(defid);const wasSleep=d.status.sleep||d.status.frozen;const as=spinFor(a),ds=spinFor(d),out=compare(as.seg,ds.seg,a,d);s.locked=true;render();showRoulette(a,d,as,ds,out,()=>{addlog(a.n+': '+segText(as.seg,a)+' / '+d.n+': '+segText(ds.seg,d));if(wasSleep){d.status.sleep=false;d.status.frozen=false;addlog(d.n+'は攻撃されて目を覚ましました。')}if(out.winner==='draw')addlog('引き分けです。どちらも残ります。');else if(out.ko){if(out.winner==='atk'){addlog(a.n+'の勝ちです。');pc(d);applyEffect(as.seg,a,d)}else{addlog(d.n+'の勝ちです。');pc(a);applyEffect(ds.seg,d,a)}}else{const winP=out.winner==='atk'?a:d,loseP=out.winner==='atk'?d:a,winSeg=out.winner==='atk'?as.seg:ds.seg;addlog(winP.n+'の判定勝ちです。');applyEffect(winSeg,winP,loseP)}resolveSurrounds();s.locked=false;end();render()})}
function showRoulette(a,d,as,ds,out,apply){const aw=$('#aw'),dw=$('#dw'),btn=$('#cont');$('#an').textContent=a.n+' / MP'+a.mp+' / '+F[a.fig].r;$('#dn').textContent=d.n+' / MP'+d.mp+' / '+F[d.fig].r;$('#ar').textContent='';$('#dr').textContent='';$('#as').innerHTML=segList(F[a.fig].w,a);$('#ds').innerHTML=segList(F[d.fig].w,d);$('#br').textContent='ルーレット回転中...';btn.style.display='none';aw.style.transition='none';dw.style.transition='none';aw.style.transform='rotate(0deg)';dw.style.transform='rotate(0deg)';aw.style.background=gradient(F[a.fig].w);dw.style.background=gradient(F[d.fig].w);aw.innerHTML=labelHtml(F[a.fig].w);dw.innerHTML=labelHtml(F[d.fig].w);$('#ro').style.display='flex';setTimeout(()=>{aw.style.transition='transform 1.45s cubic-bezier(.12,.8,.18,1)';dw.style.transition='transform 1.45s cubic-bezier(.12,.8,.18,1)';aw.style.transform='rotate('+(1440+360-as.center)+'deg)';dw.style.transform='rotate('+(1440+360-ds.center)+'deg)'},50);setTimeout(()=>{$('#ar').textContent=segText(as.seg,a);$('#dr').textContent=segText(ds.seg,d);$('#br').textContent=out.winner==='draw'?'引き分け':out.winner==='atk'?a.n+'の判定勝ち':d.n+'の判定勝ち';btn.style.display='block';btn.onclick=()=>{$('#ro').style.display='none';apply()}},1650)}
function statusMarks(p){let m='';if(p.wait>0)m+='待';if(p.status.paralyze)m+='麻';if(p.status.poison)m+='毒';if(p.status.sleep)m+='眠';if(p.status.frozen)m+='氷';if(p.status.mpMinus)m+='M-';return m}function render(){document.body.classList.toggle('locked',s.locked);$('#turnCount').textContent=s.turnCount;renderStatus();renderBoard();renderBenches();renderPc();$('#log').textContent=s.log.slice(0,18).join('\n')}function renderStatus(){const selected=s.sel?byid(s.sel.id):null;$('#status').textContent=s.win?turnLabel(s.win)+'の勝利です！':s.locked?'バトル中...':selected?turnLabel(s.turn)+'のターン / 選択中: '+selected.n:turnLabel(s.turn)+'のターン / 駒を選択'}function renderBoard(){const b=$('#board');b.innerHTML='';let svg='<svg class="lines" viewBox="0 0 100 100" preserveAspectRatio="none">';for(const [a,c] of EDGES)svg+='<line class="edge" x1="'+NODES[a][0]+'" y1="'+NODES[a][1]+'" x2="'+NODES[c][0]+'" y2="'+NODES[c][1]+'" />';svg+='</svg>';b.insertAdjacentHTML('beforeend',svg);for(const id of Object.keys(NODES)){const [x,y]=NODES[id];const bt=document.createElement('button');bt.className='node';if(SPAWN.p1.includes(id)||SPAWN.p2.includes(id))bt.classList.add('spawn');if(id==='ot4'||id==='ob4'){bt.classList.add('goal');if(id==='ob4')bt.classList.add('player')}if(s.reach.includes(id))bt.classList.add('reach');if(s.attack.includes(id))bt.classList.add('attack');bt.style.left=x+'%';bt.style.top=y+'%';bt.textContent=id==='ot4'?'◀':id==='ob4'?'▶':(SPAWN.p1.includes(id)||SPAWN.p2.includes(id))?'◎':'';bt.onclick=()=>clickNode(id);b.append(bt)}for(const p of all()){const [x,y]=NODES[p.pos];const el=document.createElement('div');el.className='fig '+p.owner+(s.sel&&s.sel.id===p.id?' sel':'')+(s.attack.includes(p.pos)?' attackable':'')+(!canAct(p)?' waiting':'');el.style.left=x+'%';el.style.top=y+'%';el.innerHTML='<span>'+p.n+'</span><span class="mp">'+effectiveMp(p)+'</span>'+(statusMarks(p)?'<span class="mark">'+statusMarks(p)+'</span>':'');el.onclick=()=>clickFigure(p);b.append(el)}}function renderBenchRow(elId,owner){const row=$(elId);row.innerHTML='';for(const p of s[owner].bench){const slot=document.createElement('div');slot.className='slot';const btn=document.createElement('button');btn.className='benchBtn'+(s.sel&&s.sel.id===p.id?' active':'');btn.disabled=owner!==s.turn||p.wait>0||!!s.win||s.locked;btn.textContent=p.n;btn.onclick=()=>selectBench(p.id);const meta=document.createElement('div');meta.className='meta';meta.textContent='MP '+p.mp+(p.wait?' / 待機':'');slot.append(btn,meta);row.append(slot)}}function renderBenches(){renderBenchRow('#topBench','p2');renderBenchRow('#bottomBench','p1')}function renderPc(){for(const id of ['p1','p2']){const box=$('#'+id+'pc');box.innerHTML='';for(const p of s[id].pc){const chip=document.createElement('span');chip.textContent=p.n;box.append(chip)}}}
$('#reset').onclick=init;init();
</script>
