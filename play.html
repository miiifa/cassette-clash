edge{stroke:#fff;stroke-width:3.8;stroke-linecap:round}.node{position:absolute;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:999px;background:#fff;border:2px solid #e5e7eb;box-shadow:0 0 5px #fff;z-index:2}.node.spawn{width:30px;height:30px;border-width:3px;background:radial-gradient(circle,#fff 0 28%,#dbeafe 29% 58%,#475569 59%)}.node.goal{width:40px;height:40px;border-width:4px;background:radial-gradient(circle,#fef3c7,#f59e0b 60%,#92400e);display:grid;place-items:center;color:#fff;font-weight:900;box-shadow:0 0 18px #f59e0b}.node.goal.player{background:radial-gradient(circle,#ecfeff,#38bdf8 60%,#075985);box-shadow:0 0 18px #38bdf8}.node.reach{outline:4px solid #60a5fa;outline-offset:3px}.node.attack{outline:4px solid #fb7185;outline-offset:3px}.fig{position:absolute;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:999px;border:4px solid #cbd5e1;display:grid;place-items:center;text-align:center;padding:4px;color:#fff;font-size:9px;font-weight:900;line-height:1.02;box-shadow:0 10px 18px #0008,inset 0 -7px 10px #0005;z-index:4}.fig.p1{background:linear-gradient(#60a5fa,#2563eb)}.fig.p2{background:linear-gradient(#fb7185,#dc2626)}.fig.sel{outline:5px solid #facc15}.fig.attackable{outline:5px solid #fb7185}.fig.waiting{filter:grayscale(.55);opacity:.75}.mp{position:absolute;right:-3px;bottom:-3px;min-width:21px;height:21px;border-radius:999px;background:#0ea5e9;border:2px solid #fff;display:grid;place-items:center;font-size:12px}.mark{position:absolute;left:-6px;top:-6px;border-radius:999px;background:#111827dd;border:1px solid #fff;padding:2px 4px;font-size:9px}.pcRows{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.pcBox{background:#f8fafc;color:#111827;border-radius:12px;padding:8px}.pcTitle{font-size:12px;font-weight:900}.chips{display:flex;gap:6px;flex-wrap:wrap;min-height:26px}.chips span{background:#e5e7eb;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900}.actions{display:grid;grid-template-columns:72px 1fr 110px;gap:8px;margin-top:10px}.action{border:0;border-radius:12px;padding:12px 8px;font-weight:900}.surrender,.ability{background:#1d4ed8;color:#fff}.ai{background:#facc15;color:#111827;font-size:28px;letter-spacing:6px}.hint{background:#f8fafccc;color:#111827;border-radius:12px;padding:8px;font-size:12px;line-height:1.45;margin-top:8px}.log{background:#020617;border-radius:16px;padding:12px;min-height:96px;white-space:pre-wrap;font:12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;line-height:1.45}.overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:14px;z-index:50;background:#000b}.box{width:min(720px,100%);max-height:92vh;overflow:auto;background:#f8fafc;color:#111827;border-radius:22px;padding:14px;box-shadow:0 22px 60px #000b}.title{text-align:center;font-size:18px;font-weight:900;margin-bottom:10px}.wheels{display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{background:#e5e7eb;border-radius:18px;padding:10px;text-align:center}.name{font-weight:900;margin-bottom:8px}.wwrap{position:relative;width:min(36vw,180px);aspect-ratio:1;margin:auto}.pointer{position:absolute;left:50%;top:-4px;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:18px solid #111827;z-index:5}.wheel{position:absolute;inset:0;border-radius:999px;border:8px solid #111827;transition:transform 1.45s cubic-bezier(.12,.8,.18,1);box-shadow:inset 0 0 0 4px #fff,0 8px 18px #0004;overflow:hidden}.wheel:after{content:"";position:absolute;inset:38%;border-radius:999px;background:#111827;border:4px solid #fff;z-index:4}.wlabel{position:absolute;left:50%;top:50%;width:68px;margin-left:-34px;margin-top:-7px;padding:1px 3px;border-radius:999px;background:#ffffffbf;color:#111827;font-size:7px;font-weight:900;line-height:1.05;text-align:center;z-index:3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.res{min-height:34px;font-size:13px;font-weight:90 <body>
<header><div><h1>コマスター</h1><div class="sub">青技優先・移動後バトル版</div></div><button id="reset" class="reset">リセット</button></header>
<main class="app"><div id="status" class="status"></div><section class="field"><div class="scorebar"><div class="score p2"><span>相手</span><span>100</span></div><div class="turn">TURN<br><span id="turnCount">1</span></div><div class="score p1"><span>自分</span><span>100</span></div></div><div id="topBench" class="bench"></div><div id="board" class="board"></div><div id="bottomBench" class="bench"></div><div class="pcRows"><div class="pcBox"><div class="pcTitle">相手PC</div><div id="p2pc" class="chips"></div></div><div class="pcBox"><div class="pcTitle">自分PC</div><div id="p1pc" class="chips"></div></div></div><div class="actions"><button class="action surrender" disabled>投了</button><button id="skipAction" class="action ability" disabled>特性発動</button><button class="action ai" disabled>AI</button></div><div class="hint">バトルは先に移動します。敵の隣へ移動した後、隣接している敵だけ赤枠になり、その敵をタップするとバトルします。青技は最優先で相手の技を無効化します。</div></section><div id="log" class="log"></div></main>
<div id="ro" class="overlay"><div class="box"><div class="title">バトルルーレット</div><div class="wheels"><div class="card"><div id="an" class="name"></div><div class="wwrap"><div class="pointer"></div><div id="aw" class="wheel"></div></div><div id="ar" class="res"></div><div id="as" class="segs"></div></div><div class="card"><div id="dn" class="name"></div><div class="wwrap"><div class="pointer"></div><div id="dw" class="wheel"></div></div><div id="dr" class="res"></div><div id="ds" class="segs"></div></div></div><div id="br" class="result">ルーレット回転中...</div><button id="cont" class="primary" style="display:none">続ける</button></div></div>
<script>
const NODES={ot1:[18,20],ot2:[28.5,20],ot3:[39,20],ot4:[50,20],ot5:[61,20],ot6:[71.5,20],ot7:[82,20],ol2:[18,34],ol3:[18,48],ol4:[18,62],or2:[82,34],or3:[82,48],or4:[82,62],it1:[34,34],it2:[50,34],it3:[66,34],im1:[34,48],im3:[66,48],ib1:[34,62],ib2:[50,62],ib3:[66,62],ob1:[18,76],ob2:[28.5,76],ob3:[39,76],ob4:[50,76],ob5:[61,76],ob6:[71.5,76],ob7:[82,76]};
const EDGES=[['ot1','ot2'],['ot2','ot3'],['ot3','ot4'],['ot4','ot5'],['ot5','ot6'],['ot6','ot7'],['ot1','ol2'],['ol2','ol3'],['ol3','ol4'],['ol4','ob1'],['ot7','or2'],['or2','or3'],['or3','or4'],['or4','ob7'],['ob1','ob2'],['ob2','ob3'],['ob3','ob4'],['ob4','ob5'],['ob5','ob6'],['ob6','ob7'],['it1','it2'],['it2','it3'],['it1','im1'],['im1','ib1'],['it3','im3'],['im3','ib3'],['ib1','ib2'],['ib2','ib3'],['ot1','it1'],['ot7','it3'],['ob1','ib1'],['ob7','ib3'],['ot3','it2'],['ob5','ib2']];
const SPAWN={p1:['ob1','ob7'],p2:['ot1','ot7']},TARGET={p1:'ot4',p2:'ob4'};function M(c,n,d,s,e){return{c,n,d,s,e:e||null}}
const F={pikachu:{n:'ピカチュウ',mp:2,r:'R',w:[M('gold','でんこうせっか',50,20),M('white','かみなり',100,12),M('purple','でんじは',2,20,{condition:'paralyze'}),M('white','でんきショック',30,40),M('miss','ミス',0,4)]},charmander:{n:'ヒトカゲ',mp:3,r:'UC',w:[M('white','ほのおのしっぽ',40,24),M('purple','えんまく',1,28,{wait:1}),M('white','ひっかく',10,32),M('miss','ミス',0,12)]},squirtle:{n:'ゼニガメ',mp:3,r:'UC',w:[M('miss','ミス',0,12),M('white','あわ',30,44),M('blue','からにこもる',0,40,{selfWait:1})]},bulbasaur:{n:'フシギダネ',mp:3,r:'UC',w:[M('purple','どくのこな',1,24,{condition:'poison'}),M('white','タネばくだん',50,20),M('purple','ねむりごな',1,24,{condition:'sleep'}),M('miss','ミス',0,28)]},eevee:{n:'イーブイ',mp:3,r:'R',w:[M('blue','かわす',0,8),M('white','たいあたり',30,24),M('white','きあいだめ',0,28,{focus:true,noKo:true,respins:1,boost:2}),M('gold','でんこうせっか',20,16),M('blue','かわす',0,12),M('miss','ミス',0,8)]},meowth:{n:'ニャース',mp:2,r:'R',w:[M('purple','ねこだまし',3,32,{swap:true}),M('white','ひっかく',40,36),M('blue','かわす',0,20),M('miss','ミス',0,8)]},charizard:{n:'リザードン',mp:2,r:'EX',w:[M('miss','ミス',0,8),M('white','ほのおのうず',60,56,{chain:true}),M('miss','ミス',0,4),M('white','ドラゴンテール',100,28,{bench:true})]},machop:{n:'ワンリキー',mp:2,r:'C',w:[M('miss','ミス',0,8),M('white','きあいパンチ',40,56),M('miss','ミス',0,4),M('blue','かわす',0,28)]},psyduck:{n:'コダック',mp:2,r:'UC',w:[M('white','みずのはどう',60,24,{condition:'confuse'}),M('white','ちょうねんりき',40,32),M('purple','かなしばり',2,28,{wait:1}),M('miss','ミス',0,12)]},dratini:{n:'ミニリュウ',mp:2,r:'R',w:[M('white','りゅうのいかり',80,20),M('purple','つきとばす',2,24,{bench:true}),M('miss','ミス',0,8),M('white','フリーズテール',30,44,{condition:'frozen'})]},kabuto:{n:'カブト',mp:2,r:'UC',w:[M('miss','ミス',0,4),M('blue','まもる',0,16,{selfWait:1}),M('white','マッドショット',40,40,{mpMinus:1}),M('blue','まもる',0,16,{selfWait:1}),M('gold','アクアジェット',30,20)]},geodude:{n:'イシツブテ',mp:2,r:'C',w:[M('purple','じばく',3,24,{selfko:true}),M('white','ころがる',30,40,{chain:true}),M('white','いわおとし',40,24),M('miss','ミス',0,8)]}};
const DECKS={p1:['pikachu','charmander','squirtle','bulbasaur','eevee','meowth'],p2:['charizard','machop','psyduck','dratini','kabuto','geodude']};
let seq=1,s;const $=q=>document.querySelector(q);function turnLabel(id){return id==='p1'?'プレイヤー1':'プレイヤー2'}function other(p){return p==='p1'?'p2':'p1'}function neigh(id){return EDGES.filter(e=>e[0]===id||e[1]===id).map(e=>e[0]===id?e[1]:e[0])}function freshStatus(){return{condition:null,mpMinus:0}}function piece(fig,owner){return{id:owner+'-'+seq++,owner,fig,n:F[fig].n,mp:F[fig].mp,pos:null,wait:0,status:freshStatus(),focusGuard:false}}function player(id){return{bench:DECKS[id].map(t=>piece(t,id)),field:[],pc:[]}}function all(){return[...s.p1.field,...s.p2.field]}function at(node){return all().find(p=>p.pos===node)}function byid(id){return[...s.p1.bench,...s.p2.bench,...s.p1.field,...s.p2.field,...s.p1.pc,...s.p2.pc].find(p=>p.id===id)}function addlog(t){s.log.unshift(t)}function clear(){s.sel=null;s.reach=[];s.attack=[];s.land={}}
function init(){seq=1;s={p1:player('p1'),p2:player('p2'),turn:'p1',sel:null,reach:[],attack:[],land:{},pending:null,win:null,locked:false,turnCount:1,log:['ゲーム開始。移動後に隣接敵を選択してバトルします。青技は最優先です。']};checkWaitWin();render()}
function canAct(p){return p.wait<=0&&p.status.condition!=='sleep'&&p.status.condition!=='frozen'}function effectiveMp(p){if(!canAct(p))return 0;return Math.max(0,p.mp-(p.status.mpMinus||0)-(s.turnCount===1&&s.turn==='p1'?1:0))}function occupiedExcept(target){return new Set(all().filter(p=>p.pos!==target).map(p=>p.pos))}function reachableMap(start,mp,blocked){const vis=new Map([[start,0]]),q=[start];while(q.length){const c=q.shift(),d=vis.get(c);if(d>=mp)continue;for(const n of neigh(c)){if(blocked.has(n)||vis.has(n))continue;vis.set(n,d+1);q.push(n)}}return vis}function reachableFrom(start,mp,blocked){const vis=reachableMap(start,mp,blocked);vis.delete(start);return[...vis.keys()]}function reachableMove(p){return reachableFrom(p.pos,effectiveMp(p),occupiedExcept(null))}function adjacentEnemies(p){return all().filter(o=>o.owner!==p.owner&&p.pos&&neigh(p.pos).includes(o.pos))}function entryTargets(p){const total=Math.max(0,p.mp-(s.turnCount===1&&s.turn==='p1'?1:0));if(total<=0||p.wait>0)return[];const r=new Set();for(const sp of SPAWN[s.turn]){if(at(sp))continue;r.add(sp);for(const n of reachableFrom(sp,total-1,occupiedExcept(null)))r.add(n)}return[...r]}function entryTargetsForPlayer(p,playerId){const total=Math.max(0,p.mp-(s.turnCount===1&&playerId==='p1'?1:0));if(total<=0||p.wait>0)return[];const r=new Set();for(const sp of SPAWN[playerId]){if(at(sp))continue;r.add(sp);for(const n of reachableFrom(sp,total-1,occupiedExcept(null)))r.add(n)}return[...r]}function canPieceAct(p){return canAct(p)&&(reachableMove(p).length>0||adjacentEnemies(p).length>0)}function hasAnyMove(playerId){if(s[playerId].bench.some(p=>entryTargetsForPlayer(p,playerId).length>0))return true;return s[playerId].field.some(canPieceAct)}function checkWaitWin(){if(s.win)return;const current=s.turn;if(!hasAnyMove(current)){s.win=other(current);clear();addlog(turnLabel(current)+'は動けません。'+turnLabel(s.win)+'の勝利です！')}}function tickWait(owner){for(const p of [...s[owner].bench,...s[owner].field])if(p.wait>0)p.wait--}function end(){const prev=s.turn;s.pending=null;tickWait(prev);clear();s.turn=other(prev);s.turnCount++;checkWaitWin()}
function addWait(p,n=1){p.wait=Math.max(p.wait,p.owner===s.turn?n+1:n)}function selectBench(id){if(s.win||s.locked||s.pending)return;const p=s[s.turn].bench.find(x=>x.id===id);if(!p||p.wait>0)return addlog(p?p.n+'は待機中です。':'');const targets=entryTargets(p);if(!targets.length){addlog(p.n+'は今は出撃できません。');return}s.sel={type:'bench',id};s.reach=targets;s.attack=[];addlog(p.n+'を選択。出撃先を選んでください。');render()}function selectField(id){if(s.win||s.locked||s.pending)return;const p=s[s.turn].field.find(x=>x.id===id);if(!p)return;if(!canAct(p)){addlog(p.n+'は状態異常/ウェイトで動けません。');return}s.sel={type:'field',id};s.reach=reachableMove(p);s.attack=adjacentEnemies(p).map(o=>o.pos);addlog(p.n+'を選択。青い点へ移動。すでに隣接している敵は赤枠でバトル可。');render()}function clickNode(n){if(s.win||s.locked)return;const t=at(n);if(s.pending&&s.pending.phase==='chooseEnemy'){if(t&&canChoosePendingEnemy(t)){startBattleWith(t.id);return}return}if(t&&t.owner===s.turn){selectField(t.id);return}if(!s.sel)return;if(s.sel.type==='bench'&&s.reach.includes(n)){deploy(n);return}if(s.sel.type==='field'&&s.reach.includes(n)&&!t){move(n);return}if(s.sel.type==='field'&&t&&t.owner!==s.turn){const a=byid(s.sel.id);if(a&&neigh(a.pos).includes(t.pos))startBattleWith(t.id);else addlog('まず敵の隣の空き点へ移動してください。')}}function clickFigure(p){if(s.win||s.locked)return;if(s.pending&&s.pending.phase==='chooseEnemy'){if(canChoosePendingEnemy(p)){startBattleWith(p.id);return}addlog('隣接している敵を選んでください。');return}if(p.owner===s.turn){selectField(p.id);return}if(s.sel&&s.sel.type==='field'){const a=byid(s.sel.id);if(a&&neigh(a.pos).includes(p.pos)){startBattleWith(p.id);return}}addlog('まず移動して敵の隣に着いてください。')}
function deploy(n){const pl=s[s.turn],p=pl.bench.find(x=>x.id===s.sel.id);pl.bench=pl.bench.filter(x=>x.id!==p.id);p.pos=n;pl.field.push(p);addlog(turnLabel(p.owner)+'の'+p.n+'が出撃しました。');if(n===TARGET[p.owner]){s.win=p.owner;clear();addlog(turnLabel(p.owner)+'の勝利です！');render();return}resolveSurrounds();end();render()}function move(n){const p=byid(s.sel.id);p.pos=n;addlog(turnLabel(p.owner)+'の'+p.n+'が移動しました。');if(n===TARGET[p.owner]){s.win=p.owner;clear();addlog(turnLabel(p.owner)+'の勝利です！');render();return}resolveSurrounds();if(!s[p.owner].field.includes(p)){end();render();return}const enemies=adjacentEnemies(p);if(enemies.length){s.pending={phase:'chooseEnemy',a:p.id};s.sel=null;s.reach=[];s.attack=enemies.map(e=>e.pos);addlog('隣接している敵を選ぶとバトルします。戦わない場合は「バトルしない」。');render();return}end();render()}function canChoosePendingEnemy(p){const a=byid(s.pending&&s.pending.a);return a&&p&&p.owner!==a.owner&&neigh(a.pos).includes(p.pos)}function startBattleWith(defid){const a=s.pending?byid(s.pending.a):byid(s.sel&&s.sel.id),d=byid(defid);if(!a||!d||!neigh(a.pos).includes(d.pos)){addlog('隣接していないのでバトルできません。');return}s.pending={phase:'battle',a:a.id,d:d.id};clear();startBattle()}
function removeField(p){s[p.owner].field=s[p.owner].field.filter(x=>x.id!==p.id);p.pos=null}function resetOnBench(p){p.status=freshStatus();p.focusGuard=false}function sendToBench(p){removeField(p);resetOnBench(p);addWait(p);s[p.owner].bench.push(p);addlog(p.n+'はベンチへ戻されました。状態異常は消えました。')}function pc(p){const pl=s[p.owner];removeField(p);resetOnBench(p);if(pl.pc.length>=2){const out=pl.pc.shift();resetOnBench(out);addWait(out);pl.bench.push(out);addlog(out.n+'がPCからベンチへ戻りました。')}pl.pc.push(p);addlog(turnLabel(p.owner)+'の'+p.n+'はPCへ送られました。')}function resolveSurrounds(){let changed=true;while(changed){changed=false;for(const p of [...all()]){const ns=neigh(p.pos);if(ns.length&&ns.every(n=>{const o=at(n);return o&&o.owner!==p.owner})){addlog(p.n+'は包囲されました。');pc(p);changed=true;break}}}}
function cloneSeg(x){return{c:x.c,n:x.n,d:x.d,s:x.s,e:x.e?{...x.e}:null,boost:1}}function spinRaw(w){let total=w.reduce((a,b)=>a+b.s,0),r=Math.random()*total,acc=0;for(const seg of w){const st=acc/total*360;acc+=seg.s;const en=acc/total*360;if((r-=seg.s)<=0)return{seg:cloneSeg(seg),center:(st+en)/2,chain:[]}}const last=w[w.length-1];return{seg:cloneSeg(last),center:350,chain:[]}}function spinFor(p){let r=spinRaw(F[p.fig].w);if(p.status.condition==='paralyze'&&(r.seg.c==='white'||r.seg.c==='gold')){addlog(p.n+'はマヒで技がミスになりました。');r.seg={c:'miss',n:'ミス',d:0,s:r.seg.s,e:null,boost:1}}if(p.status.condition==='confuse'){const old=r.seg.n;r=spinRaw(F[p.fig].w);addlog(p.n+'は混乱してルーレットを回し直しました。'+old+' → '+r.seg.n)}return r}function resolveMoveSpin(p){let r=spinFor(p);if(r.seg.e&&r.seg.e.focus){p.focusGuard=true;addlog(p.n+'のきあいだめ。負けても気絶せず、次の攻撃を強化します。');const next=spinFor(p);next.chain=[r.seg.n];if(next.seg.c==='white'||next.seg.c==='gold'){next.seg.boost=r.seg.e.boost||2;addlog(next.seg.n+'のダメージが'+next.seg.boost+'倍になります。')}else next.seg.noKo=true;return next}return r}
function baseValue(seg,p){let v=seg.d||0;if(seg.boost)v*=seg.boost;if(p.status.condition==='poison'&&(seg.c==='white'||seg.c==='gold'))v=Math.max(0,v-20);if(p.status.condition==='burn'&&(seg.c==='white'||seg.c==='gold'))v=Math.max(0,v-10);return v}function isDamage(seg){return seg.c==='white'||seg.c==='gold'}function isKoAttack(seg,p){return isDamage(seg)&&baseValue(seg,p)>0}function compare(a,b,ap,bp){const A=a.c,B=b.c,av=baseValue(a,ap),bv=baseValue(b,bp);if(A==='blue'||B==='blue')return{winner:'draw',ko:false,blue:true};if(A==='miss'&&B==='miss')return{winner:'draw',ko:false};if(A==='miss')return{winner:'def',ko:isKoAttack(b,bp)};if(B==='miss')return{winner:'atk',ko:isKoAttack(a,ap)};if(A==='gold'&&B==='purple')return{winner:'atk',ko:isKoAttack(a,ap)};if(B==='gold'&&A==='purple')return{winner:'def',ko:isKoAttack(b,bp)};if(A==='purple'||B==='purple'){if(A==='purple'&&B==='purple'){if(av===bv)return{winner:'draw',ko:false};return{winner:av>bv?'atk':'def',ko:false}}return{winner:A==='purple'?'atk':'def',ko:false}}if(av===bv)return{winner:'draw',ko:false};const win=av>bv?'atk':'def';return{winner:win,ko:isKoAttack(win==='atk'?a:b,win==='atk'?ap:bp)}}
const condJP={paralyze:'マヒ',poison:'どく',sleep:'ねむり',frozen:'こおり',burn:'やけど',confuse:'混乱'};function setCondition(p,c){p.status.condition=c;addlog(p.n+'は'+condJP[c]+'になりました。')}function applySelfOnly(seg,user){if(seg.e&&seg.e.selfWait){addWait(user,seg.e.selfWait);addlog(user.n+'にウェイトがつきました。')}}function applyMoveEffect(seg,user,target,context){const e=seg.e;if(!e)return false;let handled=false;if(e.selfWait){addWait(user,e.selfWait);addlog(user.n+'にウェイトがつきました。')}if(e.condition&&target){setCondition(target,e.condition);handled=true}if(e.wait&&target){addWait(target,e.wait);addlog(target.n+'にウェイトがつきました。');handled=true}if(e.mpMinus&&target){target.status.mpMinus=Math.max(target.status.mpMinus,e.mpMinus);addlog(target.n+'にMP-'+e.mpMinus+'がつきました。');handled=true}if(e.swap&&target&&user.pos&&target.pos){const a=user.pos;user.pos=target.pos;target.pos=a;addlog(user.n+'と'+target.n+'の場所が入れ替わりました。');handled=true}if(e.bench&&target&&s[target.owner].field.includes(target)){sendToBench(target);handled=true}if(e.selfko&&target){addlog(seg.n+'！両方PCへ送られます。');pc(user);if(s[target.owner].field.includes(target))pc(target);handled=true}if(e.chain&&context&&context.winner){addlog(seg.n+'の追加効果。連続スピンは簡易処理中です。')}return handled}function wakeOnAttacked(p){if(p.status.condition==='sleep'||p.status.condition==='frozen'){addlog(p.n+'は攻撃されて'+condJP[p.status.condition]+'が解けました。');p.status.condition=null}}
function segText(t,p){if(t.c==='miss')return t.n;if(t.c==='blue')return t.n+' [青]';if(t.c==='purple')return t.n+' [紫 ★'+t.d+']';if(t.c==='gold')return t.n+' [金 '+baseValue(t,p)+']';return t.n+' [白 '+baseValue(t,p)+']'}function colorOf(c){return{miss:'#ef4444',white:'#f8fafc',gold:'#facc15',purple:'#a855f7',blue:'#38bdf8'}[c]||'#fff'}function gradient(w){let total=w.reduce((a,b)=>a+b.s,0),acc=0,parts=[];for(const seg of w){const st=acc/total*360;acc+=seg.s;const en=acc/total*360;parts.push(colorOf(seg.c)+' '+st+'deg '+en+'deg')}return'conic-gradient('+parts.join(',')+')'}function labelHtml(w){let total=w.reduce((a,b)=>a+b.s,0),acc=0,out='';for(const seg of w){const st=acc/total*360;acc+=seg.s;const c=(st+acc/total*360)/2;out+='<span class="wlabel" style="transform:rotate('+c+'deg) translateY(-58px) rotate('+(-c)+'deg)">'+seg.n+'</span>'}return out}function effText(e){if(!e)return'';let a=[];if(e.focus)a.push('再スピン/負けても気絶しない/次ダメージ強化');if(e.condition)a.push(condJP[e.condition]);if(e.wait)a.push('ウェイト');if(e.selfWait)a.push('自分ウェイト');if(e.mpMinus)a.push('MP-'+e.mpMinus);if(e.bench)a.push('ベンチへ戻す');if(e.swap)a.push('入れ替え');if(e.selfko)a.push('両方PC');if(e.chain)a.push('連続スピン');return a.join('・')}function segList(w,p){return w.map(seg=>'<div class="seg"><span class="sw" style="background:'+colorOf(seg.c)+'"></span><span>'+segText(cloneSeg(seg),p)+' / '+seg.s+(seg.e?' / '+effText(seg.e):'')+'</span></div>').join('')}
function startBattle(){const a=byid(s.pending&&s.pending.a),d=byid(s.pending&&s.pending.d);if(!a||!d||!neigh(a.pos).includes(d.pos)){addlog('隣接していないのでバトルできません。');end();render();return}const as=resolveMoveSpin(a),ds=resolveMoveSpin(d),out=compare(as.seg,ds.seg,a,d);s.locked=true;render();showRoulette(a,d,as,ds,out,()=>{wakeOnAttacked(d);wakeOnAttacked(a);addlog(a.n+': '+segText(as.seg,a)+' / '+d.n+': '+segText(ds.seg,d));if(out.blue){applySelfOnly(as.seg,a);applySelfOnly(ds.seg,d);addlog('青技が最優先で発動し、相手の技は無効になりました。')}else if(out.winner==='draw'){addlog('引き分けです。どちらも残ります。')}else{const atkWins=out.winner==='atk',winP=atkWins?a:d,loseP=atkWins?d:a,winSeg=atkWins?as.seg:ds.seg,loseSeg=atkWins?ds.seg:as.seg;applyMoveEffect(winSeg,winP,loseP,{winner:true});if(out.ko&&s[loseP.owner].field.includes(loseP)){if(loseP.focusGuard||loseSeg.noKo){addlog(loseP.n+'は技効果で気絶しません。')}else if(!(winSeg.e&&(winSeg.e.bench||winSeg.e.selfko))){addlog(winP.n+'の勝ちです。');pc(loseP)}}else addlog(winP.n+'の判定勝ちです。')}a.focusGuard=false;d.focusGuard=false;s.pending=null;resolveSurrounds();s.locked=false;end();render()})}
function showRoulette(a,d,as,ds,out,apply){const aw=$('#aw'),dw=$('#dw'),btn=$('#cont');$('#an').textContent=a.n+' / MP'+a.mp+' / '+F[a.fig].r;$('#dn').textContent=d.n+' / MP'+d.mp+' / '+F[d.fig].r;$('#ar').textContent='';$('#dr').textContent='';$('#as').innerHTML=segList(F[a.fig].w,a);$('#ds').innerHTML=segList(F[d.fig].w,d);$('#br').textContent='ルーレット回転中...';btn.style.display='none';aw.style.transition='none';dw.style.transition='none';aw.style.transform='rotate(0deg)';dw.style.transform='rotate(0deg)';aw.style.background=gradient(F[a.fig].w);dw.style.background=gradient(F[d.fig].w);aw.innerHTML=labelHtml(F[a.fig].w);dw.innerHTML=labelHtml(F[d.fig].w);$('#ro').style.display='flex';setTimeout(()=>{aw.style.transition='transform 1.45s cubic-bezier(.12,.8,.18,1)';dw.style.transition='transform 1.45s cubic-bezier(.12,.8,.18,1)';aw.style.transform='rotate('+(1440+360-as.center)+'deg)';dw.style.transform='rotate('+(1440+360-ds.center)+'deg)'},50);setTimeout(()=>{$('#ar').textContent=(as.chain&&as.chain.length?as.chain.join('→')+'→':'')+segText(as.seg,a);$('#dr').textContent=(ds.chain&&ds.chain.length?ds.chain.join('→')+'→':'')+segText(ds.seg,d);$('#br').textContent=out.blue?'青技で無効':out.winner==='draw'?'引き分け':out.winner==='atk'?a.n+'の判定勝ち':d.n+'の判定勝ち';btn.style.display='block';btn.onclick=()=>{$('#ro').style.display='none';apply()}},1650)}
function statusMarks(p){let m='';if(p.wait>0)m+='待';if(p.status.condition==='paralyze')m+='麻';if(p.status.condition==='poison')m+='毒';if(p.status.condition==='sleep')m+='眠';if(p.status.condition==='frozen')m+='氷';if(p.status.condition==='burn')m+='火';if(p.status.condition==='confuse')m+='混';if(p.status.mpMinus)m+='M-';return m}function render(){document.body.classList.toggle('locked',s.locked);$('#turnCount').textContent=s.turnCount;renderStatus();renderBoard();renderBenches();renderPc();renderActions();$('#log').textContent=s.log.slice(0,18).join('\n')}function renderStatus(){const selected=s.sel?byid(s.sel.id):null;$('#status').textContent=s.win?turnLabel(s.win)+'の勝利です！':s.locked?'バトル中...':s.pending&&s.pending.phase==='chooseEnemy'?'隣接敵を選択中 / バトルしないも選べます':selected?turnLabel(s.turn)+'のターン / 選択中: '+selected.n:turnLabel(s.turn)+'のターン / 駒を選択'}function renderActions(){const b=$('#skipAction');if(s.pending&&s.pending.phase==='chooseEnemy'){b.disabled=false;b.textContent='バトルしない'}else{b.disabled=true;b.textContent='特性発動'}}function renderBoard(){const b=$('#board');b.innerHTML='';let svg='<svg class="lines" viewBox="0 0 100 100" preserveAspectRatio="none">';for(const [a,c] of EDGES)svg+='<line class="edge" x1="'+NODES[a][0]+'" y1="'+NODES[a][1]+'" x2="'+NODES[c][0]+'" y2="'+NODES[c][1]+'" />';svg+='</svg>';b.insertAdjacentHTML('beforeend',svg);for(const id of Object.keys(NODES)){const [x,y]=NODES[id];const bt=document.createElement('button');bt.className='node';if(SPAWN.p1.includes(id)||SPAWN.p2.includes(id))bt.classList.add('spawn');if(id==='ot4'||id==='ob4'){bt.classList.add('goal');if(id==='ob4')bt.classList.add('player')}if(s.reach.includes(id))bt.classList.add('reach');if(s.attack.includes(id))bt.classList.add('attack');bt.style.left=x+'%';bt.style.top=y+'%';bt.textContent=id==='ot4'?'◀':id==='ob4'?'▶':(SPAWN.p1.includes(id)||SPAWN.p2.includes(id))?'◎':'';bt.onclick=()=>clickNode(id);b.append(bt)}for(const p of all()){const [x,y]=NODES[p.pos];const el=document.createElement('div');el.className='fig '+p.owner+(s.sel&&s.sel.id===p.id?' sel':'')+(s.attack.includes(p.pos)?' attackable':'')+(!canAct(p)?' waiting':'');el.style.left=x+'%';el.style.top=y+'%';el.innerHTML='<span>'+p.n+'</span><span class="mp">'+effectiveMp(p)+'</span>'+(statusMarks(p)?'<span class="mark">'+statusMarks(p)+'</span>':'');el.onclick=()=>clickFigure(p);b.append(el)}}function renderBenchRow(elId,owner){const row=$(elId);row.innerHTML='';for(const p of s[owner].bench){const slot=document.createElement('div');slot.className='slot';const btn=document.createElement('button');btn.className='benchBtn'+(s.sel&&s.sel.id===p.id?' active':'');btn.disabled=owner!==s.turn||p.wait>0||!!s.win||s.locked||!!s.pending;btn.textContent=p.n;btn.onclick=()=>selectBench(p.id);const meta=document.createElement('div');meta.className='meta';meta.textContent='MP '+p.mp+(p.wait?' / 待機':'');slot.append(btn,meta);row.append(slot)}}function renderBenches(){renderBenchRow('#topBench','p2');renderBenchRow('#bottomBench','p1')}function renderPc(){for(const id of ['p1','p2']){const box=$('#'+id+'pc');box.innerHTML='';for(const p of s[id].pc){const chip=document.createElement('span');chip.textContent=p.n;box.append(chip)}}}
$('#reset').onclick=init;$('#skipAction').onclick=()=>{if(s.pending&&s.pending.phase==='chooseEnemy'){addlog('バトルしないを選びました。');end();render()}};init();
</script>
