<style>
*{box-sizing:border-box}body{margin:0;background:#090d14;color:#f8fafc;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button{font:inherit}header{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;background:#111827;color:#fff;box-shadow:0 4px 18px #0008}h1{margin:0;font-size:18px}.sub{font-size:12px;opacity:.8}.reset{border:0;border-radius:12px;padding:9px 12px;font-weight:900;background:#facc15;color:#111827}.app{display:grid;gap:10px;padding:10px;max-width:760px;margin:auto}.status{padding:10px 12px;border-radius:14px;background:#f8fafc;color:#111827;font-weight:900}.fieldWrap{border-radius:18px;overflow:hidden;background:radial-gradient(circle at 20% 16%,#ffffff45,transparent 13%),radial-gradient(circle at 80% 25%,#22d3ee38,transparent 24%),radial-gradient(circle at 42% 60%,#16a34a45,transparent 30%),linear-gradient(135deg,#334155,#475569 30%,#334155 56%,#1e293b 80%,#111827);box-shadow:0 10px 30px #0008;padding:10px}.scorebar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:8px}.score{display:flex;align-items:center;justify-content:space-between;border-radius:10px;padding:6px 8px;font-weight:900;font-size:13px}.score.left{background:linear-gradient(90deg,#2563eb,#1d4ed8)}.score.right{background:linear-gradient(90deg,#b91c1c,#dc2626)}.turnbox{background:#111827;border:2px solid #facc15;color:#f8fafc;border-radius:10px;padding:4px 8px;text-align:center;font-weight:900}.benchRow{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;min-height:72px;padding:6px 0}.benchSlot{width:58px}.benchBtn{width:58px;height:58px;border-radius:999px;border:4px solid #e5e7eb;background:radial-gradient(circle at 35% 35%,#fff,#cbd5e1 70%,#94a3b8);color:#111827;display:grid;place-items:center;text-align:center;padding:5px;font-size:10px;font-weight:900;line-height:1.05}.benchBtn.active{outline:4px solid #facc15}.benchBtn:disabled{opacity:.5}.benchMeta{text-align:center;font-size:10px;margin-top:3px;color:#f8fafc;text-shadow:0 1px 2px #000}.board{position:relative;aspect-ratio:100/92;width:100%;max-width:660px;margin:0 auto}.lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;filter:drop-shadow(0 1px 2px #000c)}.edge{stroke:#f8fafc;stroke-width:3.8;stroke-linecap:round}.node{position:absolute;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:999px;background:#fff;border:2px solid #e5e7eb;box-shadow:0 0 5px #fff;z-index:2}.node.spawn{width:30px;height:30px;border-width:3px;background:radial-gradient(circle,#fff 0 28%,#dbeafe 29% 58%,#475569 59%)}.node.goal{width:40px;height:40px;border-width:4px;background:radial-gradient(circle,#fef3c7,#f59e0b 60%,#92400e);display:grid;place-items:center;color:#fff;font-weight:900;text-shadow:0 1px 2px #000a;box-shadow:0 0 18px #f59e0b}.node.goal.player{background:radial-gradient(circle,#ecfeff,#38bdf8 60%,#075985);box-shadow:0 0 18px #38bdf8}.node.reach{outline:4px solid #60a5fa;outline-offset:3px}.node.attack{outline:4px solid #fb7185;outline-offset:3px}.figure{position:absolute;transform:translate(-50%,-50%);width:54px;height:54px;border-radius:999px;border:4px solid #cbd5e1;display:grid;place-items:center;text-align:center;padding:4px;color:#fff;line-height:1.02;font-size:10px;font-weight:900;box-shadow:0 10px 18px #0008,inset 0 -7px 10px #0005;z-index:4}.figure.p1{background:linear-gradient(#60a5fa,#2563eb)}.figure.p2{background:linear-gradient(#fb7185,#dc2626)}.figure.sel{outline:5px solid #facc15}.mp{position:absolute;right:-3px;bottom:-3px;min-width:22px;height:22px;border-radius:999px;background:#0ea5e9;color:#fff;border:2px solid #fff;display:grid;place-items:center;font-size:12px}.pcRows{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:8px}.pcBox{background:#f8fafc;color:#111827;border-radius:12px;padding:8px}.pcTitle{font-size:12px;font-weight:900;margin-bottom:5px}.pcChips{display:flex;gap:6px;flex-wrap:wrap;min-height:28px}.pcChips span{border-radius:999px;background:#e5e7eb;padding:4px 8px;font-size:11px;color:#111827;font-weight:900}.actions{display:grid;grid-template-columns:72px 1fr 110px;gap:8px;margin-top:10px}.action{border:0;border-radius:12px;padding:12px 8px;font-weight:900}.surrender{background:#1e3a8a;color:#fff}.ability{background:#1d4ed8;color:#fff}.ai{background:linear-gradient(#fde047,#eab308);color:#111827;font-size:28px;letter-spacing:6px}.hint{background:#f8fafccc;color:#111827;border-radius:12px;padding:8px;font-size:12px;line-height:1.45;margin-top:8px}.log{background:#020617;color:#e5e7eb;border-radius:16px;padding:12px;min-height:96px;white-space:pre-wrap;font:12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;line-height:1.45}.rouletteOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:16px;z-index:50;background:#000b}.rouletteBox{width:min(680px,100%);background:#f8fafc;color:#111827;border-radius:22px;padding:16px;box-shadow:0 22px 60px #000b}.rouletteTitle{font-weight:900;font-size:18px;text-align:center;margin-bottom:12px}.wheels{display:grid;grid-template-columns:1fr 1fr;gap:12px}.wheelCard{background:#e5e7eb;border-radius:18px;padding:12px;text-align:center}.wheelName{font-weight:900;margin-bottom:8px}.wheelWrap{position:relative;width:min(38vw,190px);aspect-ratio:1;margin:auto}.pointer{position:absolute;left:50%;top:-4px;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:18px solid #111827;z-index:2}.wheel{position:absolute;inset:0;border-radius:999px;border:8px solid #111827;transition:transform 1.45s cubic-bezier(.12,.8,.18,1);box-shadow:inset 0 0 0 4px #fff,0 8px 18px #0004}.wheel:after{content:"";position:absolute;inset:38%;border-radius:999px;background:#111827;border:4px solid #fff}.wheelResult{min-height:36px;font-size:13px;font-weight:900;margin-top:8px}.resultLine{text-align:center;font-weight:900;margin:12px 0}.continue{display:none;width:100%;border:0;border-radius:14px;padding:12px;background:#facc15;color:#111827;font-weight:900}.locked .benchBtn,.locked .node,.locked .figure,.locked .reset{pointer-events:none}@media(max-width:480px){.app{padding:8px}.benchRow{gap:8px}.benchSlot{width:50px}.benchBtn{width:50px;height:50px;font-size:9px}.figure{width:46px;height:46px;font-size:9px}.actions{grid-template-columns:64px 1fr 92px}.ai{font-size:24px;letter-spacing:4px}.wheels{grid-template-columns:1fr}.wheelWrap{width:170px}header{padding-top:max(10px,env(safe-area-inset-top))}}
</style>

<body>
<header><div><h1>コマスター</h1><div class="sub">マップ形状修正版</div></div><button id="reset" class="reset">リセット</button></header>
<main class="app"><div id="status" class="status"></div><section class="fieldWrap"><div class="scorebar"><div class="score left"><span>コマスター</span><span>100</span></div><div class="turnbox">TURN<br><span id="turnCount">1</span></div><div class="score right"><span>コマスター</span><span>100</span></div></div><div id="topBench" class="benchRow"></div><div id="board" class="board"></div><div id="bottomBench" class="benchRow"></div><div class="pcRows"><div class="pcBox"><div class="pcTitle">相手PC</div><div id="p2pc" class="pcChips"></div></div><div class="pcBox"><div class="pcTitle">自分PC</div><div id="p1pc" class="pcChips"></div></div></div><div class="actions"><button class="action surrender" disabled>投了</button><button class="action ability" disabled>特性発動</button><button class="action ai" disabled>AI</button></div><div class="hint">内側の正方形は田ではなく口の形です。線を太く、点を小さくして、線の上に点が乗って見えるように調整しました。</div></section><div id="log" class="log"></div></main>
<div id="rouletteOverlay" class="rouletteOverlay"><div class="rouletteBox"><div class="rouletteTitle">バトルルーレット</div><div class="wheels"><div class="wheelCard"><div id="atkName" class="wheelName"></div><div class="wheelWrap"><div class="pointer"></div><div id="atkWheel" class="wheel"></div></div><div id="atkResult" class="wheelResult"></div></div><div class="wheelCard"><div id="defName" class="wheelName"></div><div class="wheelWrap"><div class="pointer"></div><div id="defWheel" class="wheel"></div></div><div id="defResult" class="wheelResult"></div></div></div><div id="battleResult" class="resultLine">ルーレット回転中...</div><button id="continueBattle" class="continue">続ける</button></div></div>
<script>
const NODES={ot1:[18,20],ot2:[28.5,20],ot3:[39,20],ot4:[50,20],ot5:[61,20],ot6:[71.5,20],ot7:[82,20],ol2:[18,34],ol3:[18,48],ol4:[18,62],or2:[82,34],or3:[82,48],or4:[82,62],it1:[34,34],it2:[50,34],it3:[66,34],im1:[34,48],im3:[66,48],ib1:[34,62],ib2:[50,62],ib3:[66,62],ob1:[18,76],ob2:[28.5,76],ob3:[39,76],ob4:[50,76],ob5:[61,76],ob6:[71.5,76],ob7:[82,76]};
const EDGES=[['ot1','ot2'],['ot2','ot3'],['ot3','ot4'],['ot4','ot5'],['ot5','ot6'],['ot6','ot7'],['ot1','ol2'],['ol2','ol3'],['ol3','ol4'],['ol4','ob1'],['ot7','or2'],['or2','or3'],['or3','or4'],['or4','ob7'],['ob1','ob2'],['ob2','ob3'],['ob3','ob4'],['ob4','ob5'],['ob5','ob6'],['ob6','ob7'],['it1','it2'],['it2','it3'],['it1','im1'],['im1','ib1'],['it3','im3'],['im3','ib3'],['ib1','ib2'],['ib2','ib3'],['ot1','it1'],['ot7','it3'],['ob1','ib1'],['ob7','ib3'],['ot3','it2'],['ob5','ib2']];
const SPAWN={p1:['ob1','ob7'],p2:['ot1','ot7']};
const TARGET={p1:'ot4',p2:'ob4'};
const TEAM=['pikachu','charmander','bulbasaur','squirtle','eevee','mewtwo'];
const F={pikachu:{n:'ピカチュウ',mp:3,w:[['miss','ミス',0,8],['white','でんこうせっか',40,32],['gold','でんきショック',30,24],['purple','でんじは',2,20],['white','アイアンテール',70,12]]},charmander:{n:'ヒトカゲ',mp:3,w:[['miss','ミス',0,8],['white','ひっかく',30,36],['white','ひのこ',50,32],['purple','えんまく',1,20]]},bulbasaur:{n:'フシギダネ',mp:3,w:[['miss','ミス',0,8],['white','つるのムチ',40,36],['purple','どくのこな',1,24],['white','はっぱカッター',60,28]]},squirtle:{n:'ゼニガメ',mp:3,w:[['miss','ミス',0,8],['blue','からにこもる',0,24],['white','あわ',30,32],['white','みずでっぽう',60,32]]},eevee:{n:'イーブイ',mp:3,w:[['miss','ミス',0,8],['white','でんこうせっか',40,36],['gold','にどげり',30,24],['white','たいあたり',50,28]]},mewtwo:{n:'ミュウツー',mp:2,w:[['miss','ミス',0,4],['white','サイコキネシス',70,32],['purple','サイコバリア',2,24],['white','サイコブレイク',100,28],['gold','ねんりき',50,8]]}};
let seq=1,s;const $=q=>document.querySelector(q);
function turnLabel(id){return id==='p1'?'プレイヤー1':'プレイヤー2'}function other(p){return p==='p1'?'p2':'p1'}function neigh(id){return EDGES.filter(e=>e[0]===id||e[1]===id).map(e=>e[0]===id?e[1]:e[0])}function piece(fig,owner){return{id:owner+'-'+seq++,owner,fig,n:F[fig].n,mp:F[fig].mp,pos:null,wait:0}}function player(id){return{bench:TEAM.map(t=>piece(t,id)),field:[],pc:[]}}function all(){return[...s.p1.field,...s.p2.field]}function at(node){return all().find(p=>p.pos===node)}function byid(id){return[...s.p1.bench,...s.p2.bench,...s.p1.field,...s.p2.field,...s.p1.pc,...s.p2.pc].find(p=>p.id===id)}function addlog(t){s.log.unshift(t)}function clear(){s.sel=null;s.reach=[];s.attack=[]}
function init(){seq=1;s={p1:player('p1'),p2:player('p2'),turn:'p1',sel:null,reach:[],attack:[],win:null,locked:false,turnCount:1,log:['ゲーム開始。先手初手だけMPが1少なくなります。']};checkWaitWin();render()}
function effectiveMp(p){return Math.max(0,p.mp-(s.turnCount===1&&s.turn==='p1'?1:0))}function occupiedExcept(target){return new Set(all().filter(p=>p.pos!==target).map(p=>p.pos))}function reachableFrom(start,mp,blocked){const vis=new Map([[start,0]]),q=[start];while(q.length){const c=q.shift(),d=vis.get(c);if(d>=mp)continue;for(const n of neigh(c)){if(blocked.has(n)||vis.has(n))continue;vis.set(n,d+1);q.push(n)}}vis.delete(start);return[...vis.keys()]}function reachableMove(p){return reachableFrom(p.pos,effectiveMp(p),occupiedExcept(null))}function canReachTarget(p,target){return reachableFrom(p.pos,effectiveMp(p),occupiedExcept(target)).includes(target)}
function entryTargets(p){const total=effectiveMp(p);if(total<=0)return[];const result=new Set();for(const sp of SPAWN[s.turn]){if(at(sp))continue;result.add(sp);for(const n of reachableFrom(sp,total-1,occupiedExcept(null)))result.add(n)}return[...result]}function canPieceAct(p){return reachableMove(p).length>0||all().some(o=>o.owner!==p.owner&&canReachTarget(p,o.pos))}function entryTargetsForPlayer(p,playerId){const total=Math.max(0,p.mp-(s.turnCount===1&&playerId==='p1'?1:0));if(total<=0)return[];const result=new Set();for(const sp of SPAWN[playerId]){if(at(sp))continue;result.add(sp);for(const n of reachableFrom(sp,total-1,occupiedExcept(null)))result.add(n)}return[...result]}function hasAnyMove(playerId){if(s[playerId].bench.some(p=>p.wait===0&&entryTargetsForPlayer(p,playerId).length>0))return true;return s[playerId].field.some(canPieceAct)}function checkWaitWin(){if(s.win)return;const current=s.turn;if(!hasAnyMove(current)){s.win=other(current);clear();addlog(turnLabel(current)+'は動けません。'+turnLabel(s.win)+'の勝利です！')}}function end(){clear();s.turn=other(s.turn);s.turnCount++;for(const p of s[s.turn].bench)if(p.wait>0)p.wait--;checkWaitWin()}
function selectBench(id){if(s.win||s.locked)return;const p=s[s.turn].bench.find(x=>x.id===id);if(!p||p.wait)return;const targets=entryTargets(p);if(!targets.length){addlog(p.n+'は今は出撃できません。');return}s.sel={type:'bench',id};s.reach=targets;s.attack=[];addlog(p.n+'を選択。出撃先を選んでください。');render()}function selectField(id){if(s.win||s.locked)return;const p=s[s.turn].field.find(x=>x.id===id);if(!p)return;s.sel={type:'field',id};s.reach=reachableMove(p);s.attack=all().filter(o=>o.owner!==p.owner&&canReachTarget(p,o.pos)).map(o=>o.pos);addlog(p.n+'を選択。移動先か攻撃相手を選んでください。');render()}function clickNode(n){if(s.win||s.locked)return;const target=at(n);if(target&&target.owner===s.turn){selectField(target.id);return}if(!s.sel)return;if(s.sel.type==='bench'&&s.reach.includes(n)){deploy(n);return}if(s.sel.type==='field'&&s.reach.includes(n)&&!target){move(n);return}if(s.sel.type==='field'&&s.attack.includes(n)&&target){battle(target.id);return}}
function deploy(n){const pl=s[s.turn],p=pl.bench.find(x=>x.id===s.sel.id);pl.bench=pl.bench.filter(x=>x.id!==p.id);p.pos=n;pl.field.push(p);addlog(turnLabel(p.owner)+'の'+p.n+'が出撃しました。');if(n===TARGET[p.owner]){s.win=p.owner;clear();addlog(turnLabel(p.owner)+'の勝利です！');render();return}resolveSurrounds();end();render()}function move(n){const p=byid(s.sel.id);p.pos=n;addlog(turnLabel(p.owner)+'の'+p.n+'が移動しました。');if(n===TARGET[p.owner]){s.win=p.owner;clear();addlog(turnLabel(p.owner)+'の勝利です！');render();return}resolveSurrounds();end();render()}function removeField(p){s[p.owner].field=s[p.owner].field.filter(x=>x.id!==p.id);p.pos=null}function pc(p){const pl=s[p.owner];removeField(p);if(pl.pc.length>=2){const out=pl.pc.shift();out.wait=1;pl.bench.push(out);addlog(out.n+'がPCからベンチへ戻りました。1ターン待機します。')}pl.pc.push(p);addlog(turnLabel(p.owner)+'の'+p.n+'はPCへ送られました。')}function resolveSurrounds(){let changed=true;while(changed){changed=false;for(const p of [...all()]){const ns=neigh(p.pos);if(ns.length&&ns.every(n=>{const o=at(n);return o&&o.owner!==p.owner})){addlog(p.n+'は包囲されました。');pc(p);changed=true;break}}}}
function spin(w){let total=w.reduce((a,b)=>a+b[3],0),r=Math.random()*total,acc=0;for(const seg of w){const start=acc/total*360;acc+=seg[3];const end=acc/total*360;if((r-=seg[3])<=0)return{seg,center:(start+end)/2}}return{seg:w[w.length-1],center:350}}function powerType(seg){return seg[0]==='gold'?'white':seg[0]}function isKoAttack(seg){return (seg[0]==='white'||seg[0]==='gold')&&(seg[2]||0)>0}function compare(a,b){const A=powerType(a),B=powerType(b);if(A==='miss'&&B==='miss')return{winner:'draw',ko:false};if(A==='blue'&&B==='blue')return{winner:'draw',ko:false};if(A==='blue')return{winner:'atk',ko:false};if(B==='blue')return{winner:'def',ko:false};if(A==='miss')return{winner:'def',ko:isKoAttack(b)};if(B==='miss')return{winner:'atk',ko:isKoAttack(a)};if(A==='purple'||B==='purple'){if(A==='purple'&&B==='purple'){if(a[2]===b[2])return{winner:'draw',ko:false};return{winner:a[2]>b[2]?'atk':'def',ko:false}}return{winner:A==='purple'?'atk':'def',ko:false}}if(a[2]===b[2])return{winner:'draw',ko:false};const win=a[2]>b[2]?'atk':'def';return{winner:win,ko:isKoAttack(win==='atk'?a:b)}}function segText(t){if(t[0]==='miss')return t[1];if(t[0]==='blue')return t[1]+' [青]';if(t[0]==='purple')return t[1]+' [紫 ★'+t[2]+']';if(t[0]==='gold')return t[1]+' [金 '+t[2]+']';return t[1]+' [白 '+t[2]+']'}function colorOf(t){return{miss:'#ef4444',white:'#f8fafc',gold:'#facc15',purple:'#a855f7',blue:'#38bdf8'}[t]||'#fff'}function gradient(w){let total=w.reduce((a,b)=>a+b[3],0),acc=0,parts=[];for(const seg of w){const st=acc/total*360;acc+=seg[3];const en=acc/total*360;parts.push(colorOf(seg[0])+' '+st+'deg '+en+'deg')}return'conic-gradient('+parts.join(',')+')'}
function battle(defid){const a=byid(s.sel.id),d=byid(defid),as=spin(F[a.fig].w),ds=spin(F[d.fig].w),out=compare(as.seg,ds.seg);s.locked=true;render();showRoulette(a,d,as,ds,out,()=>{addlog(a.n+': '+segText(as.seg)+' / '+d.n+': '+segText(ds.seg));if(out.winner==='draw')addlog('引き分けです。どちらも残ります。');else if(!out.ko)addlog((out.winner==='atk'?a.n:d.n)+'が判定勝ち。ただしこの技では気絶しません。');else if(out.winner==='atk'){addlog(a.n+'の勝ちです。');pc(d)}else{addlog(d.n+'の勝ちです。');pc(a)}resolveSurrounds();s.locked=false;end();render()})}function showRoulette(a,d,as,ds,out,apply){const ov=$('#rouletteOverlay'),aw=$('#atkWheel'),dw=$('#defWheel'),btn=$('#continueBattle');$('#atkName').textContent=a.n;$('#defName').textContent=d.n;$('#atkResult').textContent='';$('#defResult').textContent='';$('#battleResult').textContent='ルーレット回転中...';btn.style.display='none';aw.style.transition='none';dw.style.transition='none';aw.style.transform='rotate(0deg)';dw.style.transform='rotate(0deg)';aw.style.background=gradient(F[a.fig].w);dw.style.background=gradient(F[d.fig].w);ov.style.display='flex';setTimeout(()=>{aw.style.transition='transform 1.45s cubic-bezier(.12,.8,.18,1)';dw.style.transition='transform 1.45s cubic-bezier(.12,.8,.18,1)';aw.style.transform='rotate('+(1440+360-as.center)+'deg)';dw.style.transform='rotate('+(1530+360-ds.center)+'deg)'},50);setTimeout(()=>{$('#atkResult').textContent=segText(as.seg);$('#defResult').textContent=segText(ds.seg);$('#battleResult').textContent=out.winner==='draw'?'引き分け':out.winner==='atk'?a.n+'の判定勝ち':d.n+'の判定勝ち';btn.style.display='block';btn.onclick=()=>{ov.style.display='none';apply()}},1650)}
function render(){document.body.classList.toggle('locked',s.locked);$('#turnCount').textContent=s.turnCount;renderStatus();renderBoard();renderBenches();renderPc();$('#log').textContent=s.log.slice(0,16).join('\n')}function renderStatus(){const selected=s.sel?byid(s.sel.id):null;$('#status').textContent=s.win?turnLabel(s.win)+'の勝利です！':s.locked?'バトル中...':selected?turnLabel(s.turn)+'のターン / 選択中: '+selected.n:turnLabel(s.turn)+'のターン / 駒を選択'}
function renderBoard(){const b=$('#board');b.innerHTML='';let svg='<svg class="lines" viewBox="0 0 100 92" preserveAspectRatio="none">';for(const [a,c] of EDGES)svg+='<line class="edge" x1="'+NODES[a][0]+'" y1="'+NODES[a][1]+'" x2="'+NODES[c][0]+'" y2="'+NODES[c][1]+'" />';svg+='</svg>';b.insertAdjacentHTML('beforeend',svg);for(const id of Object.keys(NODES)){const [x,y]=NODES[id];const bt=document.createElement('button');bt.className='node';if(SPAWN.p1.includes(id)||SPAWN.p2.includes(id))bt.classList.add('spawn');if(id==='ot4'||id==='ob4'){bt.classList.add('goal');if(id==='ob4')bt.classList.add('player')}if(s.reach.includes(id))bt.classList.add('reach');if(s.attack.includes(id))bt.classList.add('attack');bt.style.left=x+'%';bt.style.top=y+'%';bt.textContent=id==='ot4'?'◀':id==='ob4'?'▶':(SPAWN.p1.includes(id)||SPAWN.p2.includes(id))?'◎':'';bt.onclick=()=>clickNode(id);b.append(bt)}for(const p of all()){const [x,y]=NODES[p.pos];const el=document.createElement('div');el.className='figure '+p.owner+(s.sel&&s.sel.id===p.id?' sel':'');el.style.left=x+'%';el.style.top=y+'%';el.innerHTML='<span>'+p.n+'</span><span class="mp">'+p.mp+'</span>';el.onclick=()=>selectField(p.id);b.append(el)}}function renderBenchRow(elId,owner){const row=$(elId);row.innerHTML='';for(const p of s[owner].bench){const slot=document.createElement('div');slot.className='benchSlot';const btn=document.createElement('button');btn.className='benchBtn'+(s.sel&&s.sel.id===p.id?' active':'');btn.disabled=owner!==s.turn||p.wait>0||!!s.win||s.locked;btn.textContent=p.n;btn.onclick=()=>selectBench(p.id);const meta=document.createElement('div');meta.className='benchMeta';meta.textContent='移動 '+p.mp+(p.wait?' / 待機':'');slot.append(btn,meta);row.append(slot)}}function renderBenches(){renderBenchRow('#topBench','p2');renderBenchRow('#bottomBench','p1')}function renderPc(){for(const id of ['p1','p2']){const box=$('#'+id+'pc');box.innerHTML='';for(const p of s[id].pc){const chip=document.createElement('span');chip.textContent=p.n;box.append(chip)}}}
$('#reset').onclick=init;init();
</script>
</body>
