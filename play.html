<!doctype html>
<html lang='ja'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1, viewport-fit=cover'>
<title>コマスター オフライン</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#080d14;color:#f8fafc;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}button{font:inherit}header{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;background:#111827;color:#fff;box-shadow:0 4px 18px #0006}h1{margin:0;font-size:18px}.sub{font-size:12px;opacity:.78}.reset{border:0;border-radius:12px;padding:9px 12px;font-weight:900;background:#facc15;color:#111827}.app{display:grid;gap:10px;padding:10px;max-width:960px;margin:auto}.status{padding:11px 12px;border-radius:14px;background:#f8fafc;color:#111827;border:1px solid #dbe3ef;font-weight:900}.stage{position:relative;overflow:hidden;border-radius:20px;padding:12px;background:radial-gradient(circle at 25% 20%,#e0f2fe99,transparent 28%),radial-gradient(circle at 75% 30%,#fce7f399,transparent 30%),radial-gradient(circle at 30% 80%,#ddd6fe99,transparent 35%),linear-gradient(135deg,#9ca3af,#e5e7eb 35%,#a7f3d0 55%,#c4b5fd 75%,#fef3c7);box-shadow:0 10px 28px #0006}.board{position:relative;width:100%;aspect-ratio:7/6.3;max-width:680px;margin:auto}.lines{position:absolute;inset:0;width:100%;height:100%;filter:drop-shadow(0 1px 2px #0007);pointer-events:none}.edge{stroke:#fff;stroke-width:2.6;stroke-linecap:round}.node{position:absolute;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:999px;border:3px solid #fff;background:#ffffff55;box-shadow:0 0 8px #fff8;display:grid;place-items:center;color:#111827;font-size:9px;font-weight:900;z-index:2}.node.spawn{width:34px;height:34px;background:repeating-radial-gradient(circle,#ffffffcc 0 3px,#ffffff44 4px 7px);color:#334155}.node.goal{width:42px;height:42px;border-color:#fff;background:#facc15;color:#fff;text-shadow:0 1px 2px #0008;box-shadow:0 0 14px #facc15}.node.goal.p1goal{background:#38bdf8;box-shadow:0 0 16px #38bdf8}.node.reach{outline:5px solid #60a5fa;outline-offset:2px}.node.attack{outline:5px solid #fb7185;outline-offset:2px}.figure{position:absolute;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:999px;border:4px solid #111827;display:grid;place-items:center;text-align:center;padding:4px;color:#fff;font-size:11px;line-height:1.05;font-weight:900;z-index:4;box-shadow:0 10px 14px #0006,inset 0 -7px 10px #0004}.figure.p1{background:linear-gradient(#60a5fa,#2563eb);border-bottom-color:#ef4444}.figure.p2{background:linear-gradient(#fb7185,#dc2626);border-bottom-color:#38bdf8}.figure.sel{outline:5px solid #facc15}.mpbadge{position:absolute;right:-5px;bottom:-5px;min-width:22px;height:22px;border-radius:999px;background:#0ea5e9;color:#fff;display:grid;place-items:center;font-size:12px;border:2px solid #fff}.panel{background:#f8fafc;color:#111827;border-radius:18px;padding:12px;box-shadow:0 8px 24px #0003}.panel.turn{outline:4px solid #facc15}.panel h2{display:flex;justify-content:space-between;align-items:center;margin:0 0 10px;font-size:16px}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.card{min-height:46px;border:2px solid transparent;border-radius:13px;padding:9px;background:#e5e7eb;color:#111827;text-align:left;font-weight:900}.card.active{border-color:#2563eb;background:#dbeafe}.card:disabled{opacity:.45}.pc{display:flex;gap:6px;flex-wrap:wrap;min-height:32px}.pc span{border-radius:999px;background:#e5e7eb;padding:6px 9px;font-size:12px;font-weight:900}.log{background:#020617;color:#e5e7eb;border-radius:16px;padding:12px;min-height:112px;white-space:pre-wrap;font:12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;line-height:1.45}.hint{font-size:12px;color:#334155;margin-top:8px;line-height:1.5;background:#ffffffaa;border-radius:12px;padding:8px}.rouletteOverlay{position:fixed;inset:0;z-index:50;background:#000a;display:none;align-items:center;justify-content:center;padding:16px}.rouletteBox{width:min(680px,100%);background:#f8fafc;color:#111827;border-radius:22px;padding:16px;box-shadow:0 22px 60px #000b}.rouletteTitle{font-weight:900;font-size:18px;margin-bottom:12px;text-align:center}.wheels{display:grid;grid-template-columns:1fr 1fr;gap:12px}.wheelCard{background:#e5e7eb;border-radius:18px;padding:12px;text-align:center}.wheelName{font-weight:900;margin-bottom:8px}.wheelWrap{position:relative;width:min(38vw,190px);aspect-ratio:1;margin:auto}.pointer{position:absolute;left:50%;top:-4px;transform:translateX(-50%);z-index:2;width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:18px solid #111827}.wheel{position:absolute;inset:0;border-radius:999px;border:8px solid #111827;transition:transform 1.45s cubic-bezier(.12,.8,.18,1);box-shadow:inset 0 0 0 4px #fff,0 8px 18px #0004}.wheel:after{content:'';position:absolute;inset:38%;border-radius:999px;background:#111827;border:4px solid #fff}.wheelResult{margin-top:8px;min-height:34px;font-size:13px;font-weight:900}.resultLine{text-align:center;font-weight:900;margin:12px 0}.continue{display:none;width:100%;border:0;border-radius:14px;padding:12px;background:#facc15;color:#111827;font-weight:900}.locked .node,.locked .card,.locked .reset{pointer-events:none}@media(min-width:860px){.app{grid-template-columns:220px 1fr 220px;align-items:start}.status{grid-column:2}.stage{grid-column:2}.p2panel{grid-column:1;grid-row:1/4}.p1panel{grid-column:3;grid-row:1/4}.log{grid-column:2}.cards{grid-template-columns:1fr}}@media(max-width:480px){.app{padding:8px}.stage,.panel{padding:9px;border-radius:16px}.node{width:22px;height:22px}.node.spawn{width:30px;height:30px}.node.goal{width:36px;height:36px}.figure{width:46px;height:46px;font-size:10px}.cards{grid-template-columns:1fr 1fr}.card{font-size:13px;padding:8px;min-height:44px}.wheels{grid-template-columns:1fr}.wheelWrap{width:170px}header{padding-top:max(10px,env(safe-area-inset-top))}}
</style>
</head>
<body>
<header><div><h1>コマスター</h1><div class='sub'>原作寄せ・オフライン版</div></div><button id='reset' class='reset'>リセット</button></header>
<main class='app' id='app'>
  <div id='status' class='status'></div>
  <section class='stage'>
    <div id='board' class='board'></div>
    <div class='hint'>操作: ベンチの駒をタップ → 自分側のSPへ出撃。盤面の駒をタップ → 青いノードへ移動、赤いノードの相手にバトル。</div>
  </section>
  <section id='p2panel' class='panel p2panel'><h2>プレイヤー2 <small id='p2count'></small></h2><div id='p2bench' class='cards'></div><h2 style='margin-top:12px'>PC</h2><div id='p2pc' class='pc'></div></section>
  <section id='p1panel' class='panel p1panel'><h2>プレイヤー1 <small id='p1count'></small></h2><div id='p1bench' class='cards'></div><h2 style='margin-top:12px'>PC</h2><div id='p1pc' class='pc'></div></section>
  <div id='log' class='log'></div>
</main>
<div id='rouletteOverlay' class='rouletteOverlay'>
  <div class='rouletteBox'>
    <div class='rouletteTitle'>バトルルーレット</div>
    <div class='wheels'>
      <div class='wheelCard'><div id='atkName' class='wheelName'></div><div class='wheelWrap'><div class='pointer'></div><div id='atkWheel' class='wheel'></div></div><div id='atkResult' class='wheelResult'></div></div>
      <div class='wheelCard'><div id='defName' class='wheelName'></div><div class='wheelWrap'><div class='pointer'></div><div id='defWheel' class='wheel'></div></div><div id='defResult' class='wheelResult'></div></div>
    </div>
    <div id='battleResult' class='resultLine'>ルーレット回転中...</div>
    <button id='continueBattle' class='continue'>続ける</button>
  </div>
</div>
<script>
const NODES={sp2L:[8,8],topA:[32,8],goal2:[50,8],topB:[68,8],sp2R:[92,8],l1:[8,28],l2:[8,50],l3:[8,72],r1:[92,28],r2:[92,50],r3:[92,72],iTL:[28,28],iT:[50,28],iTR:[72,28],iML:[28,50],iMR:[72,50],iBL:[28,72],iB:[50,72],iBR:[72,72],sp1L:[8,92],botA:[32,92],goal1:[50,92],botB:[68,92],sp1R:[92,92]};
const EDGES=[['sp2L','topA'],['topA','goal2'],['goal2','topB'],['topB','sp2R'],['sp1L','botA'],['botA','goal1'],['goal1','botB'],['botB','sp1R'],['sp2L','l1'],['l1','l2'],['l2','l3'],['l3','sp1L'],['sp2R','r1'],['r1','r2'],['r2','r3'],['r3','sp1R'],['sp2L','iTL'],['sp2R','iTR'],['sp1L','iBL'],['sp1R','iBR'],['topA','iT'],['topB','iT'],['botA','iB'],['botB','iB'],['iTL','iT'],['iT','iTR'],['iTL','iML'],['iML','iBL'],['iTR','iMR'],['iMR','iBR'],['iBL','iB'],['iB','iBR'],['iTL','l1'],['iTR','r1'],['iBL','l3'],['iBR','r3']];
const SPAWN={p1:['sp1L','sp1R'],p2:['sp2L','sp2R']};
const TARGET={p1:'goal2',p2:'goal1'};
const TEAM=['pikachu','charmander','bulbasaur','squirtle','eevee','mewtwo'];
const F={pikachu:{n:'ピカチュウ',mp:3,w:[['miss','ミス',0,8],['white','でんこうせっか',40,32],['gold','でんきショック',30,24],['purple','でんじは',2,20],['white','アイアンテール',70,12]]},charmander:{n:'ヒトカゲ',mp:3,w:[['miss','ミス',0,8],['white','ひっかく',30,36],['white','ひのこ',50,32],['purple','えんまく',1,20]]},bulbasaur:{n:'フシギダネ',mp:3,w:[['miss','ミス',0,8],['white','つるのムチ',40,36],['purple','どくのこな',1,24],['white','はっぱカッター',60,28]]},squirtle:{n:'ゼニガメ',mp:3,w:[['miss','ミス',0,8],['blue','からにこもる',0,24],['white','あわ',30,32],['white','みずでっぽう',60,32]]},eevee:{n:'イーブイ',mp:3,w:[['miss','ミス',0,8],['white','でんこうせっか',40,36],['gold','にどげり',30,24],['white','たいあたり',50,28]]},mewtwo:{n:'ミュウツー',mp:2,w:[['miss','ミス',0,4],['white','サイコキネシス',70,32],['purple','サイコバリア',2,24],['white','サイコブレイク',100,28],['gold','ねんりき',50,8]]}};
let seq=1,s;const $=q=>document.querySelector(q);function turnLabel(id){return id==='p1'?'プレイヤー1':'プレイヤー2'}function other(p){return p==='p1'?'p2':'p1'}function neigh(id){return EDGES.filter(e=>e[0]===id||e[1]===id).map(e=>e[0]===id?e[1]:e[0])}function makePiece(fig,owner){return{id:owner+'-'+seq++,owner,fig,n:F[fig].n,mp:F[fig].mp,pos:null,wait:0}}function makePlayer(id){return{bench:TEAM.map(t=>makePiece(t,id)),field:[],pc:[]}}function init(){seq=1;s={p1:makePlayer('p1'),p2:makePlayer('p2'),turn:'p1',sel:null,reach:[],attack:[],win:null,locked:false,log:['ゲーム開始。プレイヤー1からです。']};render()}function all(){return[...s.p1.field,...s.p2.field]}function at(node){return all().find(p=>p.pos===node)}function byid(id){return[...s.p1.bench,...s.p2.bench,...s.p1.field,...s.p2.field,...s.p1.pc,...s.p2.pc].find(p=>p.id===id)}function occupied(){return new Set(all().map(p=>p.pos))}function addlog(t){s.log.unshift(t)}function clear(){s.sel=null;s.reach=[];s.attack=[]}function end(){clear();s.turn=other(s.turn);for(const p of s[s.turn].bench)if(p.wait>0)p.wait--}function reachable(start,mp){const occ=occupied(),vis=new Map([[start,0]]),q=[start];while(q.length){const c=q.shift(),d=vis.get(c);if(d>=mp)continue;for(const n of neigh(c)){if(occ.has(n)||vis.has(n))continue;vis.set(n,d+1);q.push(n)}}vis.delete(start);return[...vis.keys()]}function selectBench(id){if(s.win||s.locked)return;const p=s[s.turn].bench.find(x=>x.id===id);if(!p||p.wait)return;s.sel={type:'bench',id};s.reach=SPAWN[s.turn].filter(c=>!at(c));s.attack=[];addlog(p.n+'を選択。SPをタップしてください。');render()}function selectField(id){if(s.win||s.locked)return;const p=s[s.turn].field.find(x=>x.id===id);if(!p)return;s.sel={type:'field',id};s.reach=reachable(p.pos,p.mp);s.attack=neigh(p.pos).map(at).filter(x=>x&&x.owner!==p.owner).map(x=>x.pos);addlog(p.n+'を選択。移動先か攻撃相手を選んでください。');render()}function clickNode(n){if(s.win||s.locked)return;const target=at(n);if(target&&target.owner===s.turn){selectField(target.id);return}if(!s.sel)return;if(s.sel.type==='bench'&&s.reach.includes(n)){deploy(n);return}if(s.sel.type==='field'&&s.reach.includes(n)&&!target){move(n);return}if(s.sel.type==='field'&&s.attack.includes(n)&&target){battle(target.id);return}}function deploy(n){const pl=s[s.turn],p=pl.bench.find(x=>x.id===s.sel.id);pl.bench=pl.bench.filter(x=>x.id!==p.id);p.pos=n;pl.field.push(p);addlog(turnLabel(p.owner)+'の'+p.n+'が出撃しました。');resolveSurrounds();end();render()}function move(n){const p=byid(s.sel.id);p.pos=n;addlog(turnLabel(p.owner)+'の'+p.n+'が移動しました。');if(n===TARGET[p.owner]){s.win=p.owner;clear();addlog(turnLabel(p.owner)+'の勝利です！');render();return}resolveSurrounds();end();render()}function removeField(p){const pl=s[p.owner];pl.field=pl.field.filter(x=>x.id!==p.id);p.pos=null}function pc(p){const pl=s[p.owner];removeField(p);if(pl.pc.length>=2){const out=pl.pc.shift();out.wait=1;pl.bench.push(out);addlog(out.n+'がPCからベンチへ戻りました。1ターン待機します。')}pl.pc.push(p);addlog(turnLabel(p.owner)+'の'+p.n+'はPCへ送られました。')}function resolveSurrounds(){let changed=true;while(changed){changed=false;for(const p of [...all()]){const ns=neigh(p.pos);if(ns.length&&ns.every(n=>{const o=at(n);return o&&o.owner!==p.owner})){addlog(p.n+'は包囲されました。');pc(p);changed=true;break}}}}function spin(w){let total=w.reduce((a,b)=>a+b[3],0),r=Math.random()*total,acc=0;for(let i=0;i<w.length;i++){const seg=w[i];const start=acc/total*360;acc+=seg[3];const end=acc/total*360;if((r-=seg[3])<=0)return{seg,index:i,center:(start+end)/2}}return{seg:w[w.length-1],index:w.length-1,center:350}}function cmp(a,b){const fa=a[0],fb=b[0],va=a[2],vb=b[2];if(fa==='miss'&&fb==='miss')return'draw';if(fa==='miss')return'def';if(fb==='miss')return'atk';if(fa==='blue'&&fb==='blue')return'draw';if(fa==='blue')return fb==='gold'?'def':'draw';if(fb==='blue')return fa==='gold'?'atk':'draw';if(fa==='purple'||fb==='purple'){if(fa==='gold')return'atk';if(fb==='gold')return'def';if(fa==='purple'&&fb==='purple')return va===vb?'draw':va>vb?'atk':'def';if(fa==='purple')return'atk';if(fb==='purple')return'def'}return va===vb?'draw':va>vb?'atk':'def'}function segText(t){if(t[0]==='miss')return t[1];if(t[0]==='blue')return t[1]+' [青]';if(t[0]==='purple')return t[1]+' [紫 ★'+t[2]+']';if(t[0]==='gold')return t[1]+' [金 '+t[2]+']';return t[1]+' [白 '+t[2]+']'}function battle(defid){const a=byid(s.sel.id),d=byid(defid),as=spin(F[a.fig].w),ds=spin(F[d.fig].w),r=cmp(as.seg,ds.seg);s.locked=true;render();showRoulette(a,d,as,ds,r,()=>{addlog(a.n+': '+segText(as.seg)+' / '+d.n+': '+segText(ds.seg));if(r==='draw')addlog('引き分けです。どちらも残ります。');else if(r==='atk'){addlog(a.n+'の勝ちです。');pc(d)}else{addlog(d.n+'の勝ちです。');pc(a)}resolveSurrounds();s.locked=false;end();render()})}function colorOf(t){return{miss:'#ef4444',white:'#f8fafc',gold:'#facc15',purple:'#a855f7',blue:'#38bdf8'}[t]||'#fff'}function gradient(w){let total=w.reduce((a,b)=>a+b[3],0),acc=0,parts=[];for(const seg of w){const st=acc/total*360;acc+=seg[3];const en=acc/total*360;parts.push(colorOf(seg[0])+' '+st+'deg '+en+'deg')}return'conic-gradient('+parts.join(',')+')'}function showRoulette(a,d,as,ds,r,apply){const ov=$('#rouletteOverlay'),aw=$('#atkWheel'),dw=$('#defWheel'),btn=$('#continueBattle');$('#atkName').textContent=a.n;$('#defName').textContent=d.n;$('#atkResult').textContent='';$('#defResult').textContent='';$('#battleResult').textContent='ルーレット回転中...';btn.style.display='none';aw.style.transition='none';dw.style.transition='none';aw.style.transform='rotate(0deg)';dw.style.transform='rotate(0deg)';aw.style.background=gradient(F[a.fig].w);dw.style.background=gradient(F[d.fig].w);ov.style.display='flex';setTimeout(()=>{aw.style.transition='transform 1.45s cubic-bezier(.12,.8,.18,1)';dw.style.transition='transform 1.45s cubic-bezier(.12,.8,.18,1)';aw.style.transform='rotate('+(1440+360-as.center)+'deg)';dw.style.transform='rotate('+(1530+360-ds.center)+'deg)'},50);setTimeout(()=>{$('#atkResult').textContent=segText(as.seg);$('#defResult').textContent=segText(ds.seg);$('#battleResult').textContent=r==='draw'?'引き分け':r==='atk'?a.n+'の勝ち':d.n+'の勝ち';btn.style.display='block';btn.onclick=()=>{ov.style.display='none';apply()}},1650)}function render(){document.body.classList.toggle('locked',s.locked);renderStatus();renderBoard();renderPanels();$('#log').textContent=s.log.slice(0,14).join('\n')}function renderStatus(){const selected=s.sel?byid(s.sel.id):null;$('#status').textContent=s.win?turnLabel(s.win)+'の勝利です！':s.locked?'バトル中...':selected?turnLabel(s.turn)+'のターン / 選択中: '+selected.n:turnLabel(s.turn)+'のターン / 駒をタップ';$('#p1panel').classList.toggle('turn',s.turn==='p1'&&!s.win&&!s.locked);$('#p2panel').classList.toggle('turn',s.turn==='p2'&&!s.win&&!s.locked)}function renderBoard(){const b=$('#board');b.innerHTML='';let svg='<svg class="lines" viewBox="0 0 100 100" preserveAspectRatio="none">';for(const [a,c] of EDGES){svg+='<line class="edge" x1="'+NODES[a][0]+'" y1="'+NODES[a][1]+'" x2="'+NODES[c][0]+'" y2="'+NODES[c][1]+'" />'}svg+='</svg>';b.insertAdjacentHTML('beforeend',svg);for(const id of Object.keys(NODES)){const [x,y]=NODES[id];const bt=document.createElement('button');bt.className='node';if(SPAWN.p1.includes(id)||SPAWN.p2.includes(id))bt.classList.add('spawn');if(id==='goal1'||id==='goal2'){bt.classList.add('goal');if(id==='goal1')bt.classList.add('p1goal')}if(s.reach.includes(id))bt.classList.add('reach');if(s.attack.includes(id))bt.classList.add('attack');bt.style.left=x+'%';bt.style.top=y+'%';bt.textContent=id==='goal1'||id==='goal2'?'▶':SPAWN.p1.includes(id)||SPAWN.p2.includes(id)?'SP':'';bt.onclick=()=>clickNode(id);b.append(bt)}for(const p of all()){const [x,y]=NODES[p.pos];const el=document.createElement('div');el.className='figure '+p.owner+(s.sel&&s.sel.id===p.id?' sel':'');el.style.left=x+'%';el.style.top=y+'%';el.innerHTML='<span>'+p.n+'</span><span class="mpbadge">'+p.mp+'</span>';el.onclick=()=>selectField(p.id);b.append(el)}}function renderPanels(){for(const id of ['p2','p1']){const ben=$('#'+id+'bench'),pcEl=$('#'+id+'pc');ben.innerHTML='';pcEl.innerHTML='';$('#'+id+'count').textContent='盤上 '+s[id].field.length+'体';for(const p of s[id].bench){const bt=document.createElement('button');bt.className='card'+(s.sel&&s.sel.id===p.id?' active':'');bt.disabled=id!==s.turn||p.wait>0||!!s.win||s.locked;bt.innerHTML='<span>'+p.n+'</span><br><small>移動 '+p.mp+(p.wait?' / 待機':'')+'</small>';bt.onclick=()=>selectBench(p.id);ben.append(bt)}for(const p of s[id].pc){const sp=document.createElement('span');sp.textContent=p.n;pcEl.append(sp)}}}$('#reset').onclick=init;init();
</script>
</body>
</html>
