<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pokemon Duel Offline - Play</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#eef2f7;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button{font:inherit}header{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;background:#111827;color:#fff}h1{margin:0;font-size:17px}.sub{font-size:12px;opacity:.75}.reset{border:0;border-radius:12px;padding:9px 12px;font-weight:800;background:#facc15}.app{display:grid;gap:12px;padding:12px;max-width:1040px;margin:auto}.status{padding:11px 12px;border-radius:14px;background:#fff;border:1px solid #dbe3ef;font-weight:800}.boardWrap{background:#fff;border-radius:18px;padding:12px;box-shadow:0 8px 24px rgba(15,23,42,.08)}.board{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;aspect-ratio:7/5;width:100%;max-width:640px;margin:auto}.cell{position:relative;display:grid;place-items:center;border:2px dashed transparent;border-radius:12px;background:transparent;color:#94a3b8;font-size:10px;min-width:0;min-height:42px}.cell.playable{background:#f8fafc;border-color:#d1d5db}.cell:disabled{opacity:.45}.cell.goal1{background:#fee2e2}.cell.goal2{background:#dbeafe}.cell.spawn:after{content:"SP";position:absolute;top:2px;right:4px;font-size:9px;font-weight:800;opacity:.55}.cell.reach{outline:4px solid #60a5fa}.cell.attack{outline:4px solid #f87171}.piece{width:86%;height:86%;border-radius:999px;display:grid;place-items:center;padding:3px;text-align:center;color:#fff;font-weight:900;font-size:clamp(8px,2.6vw,13px);line-height:1.05;box-shadow:inset 0 -4px 10px rgba(0,0,0,.2)}.p1{background:#2563eb}.p2{background:#dc2626}.piece.sel{outline:4px solid #fde047}.players{display:grid;gap:12px}.panel{background:#fff;border-radius:18px;padding:12px;box-shadow:0 8px 24px rgba(15,23,42,.08)}.panel.turn{outline:4px solid #facc15}.panel h2{display:flex;justify-content:space-between;margin:0 0 10px;font-size:16px}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.card{min-height:46px;border:2px solid transparent;border-radius:13px;padding:9px;background:#e5e7eb;color:#111827;text-align:left;font-weight:800}.card.active{border-color:#2563eb;background:#dbeafe}.card:disabled{opacity:.45}.pc{display:flex;gap:6px;flex-wrap:wrap;min-height:32px}.pc span{border-radius:999px;background:#e5e7eb;padding:6px 9px;font-size:12px;font-weight:800}.log{background:#111827;color:#e5e7eb;border-radius:16px;padding:12px;min-height:120px;white-space:pre-wrap;font:12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;line-height:1.45}.hint{font-size:12px;color:#475569;margin-top:8px;line-height:1.5}@media(min-width:860px){.app{grid-template-columns:230px 1fr 230px;align-items:start}.boardWrap{grid-column:2;grid-row:1/5}.status{grid-column:2;grid-row:1}.players{display:contents}.p2panel{grid-column:1;grid-row:1/5}.p1panel{grid-column:3;grid-row:1/5}.log{grid-column:2}.cards{grid-template-columns:1fr}.boardWrap{margin-top:58px}}@media(max-width:480px){.app{padding:8px;gap:8px}.boardWrap,.panel{padding:9px;border-radius:14px}.board{gap:4px}.cell{border-radius:9px;min-height:38px}.cards{grid-template-columns:1fr 1fr}.card{font-size:13px;padding:8px;min-height:44px}header{padding-top:max(10px,env(safe-area-inset-top))}}
</style>
</head>
<body>
<header><div><h1>Pokemon Duel Offline</h1><div class="sub">スマホ用・1ファイル版</div></div><button id="reset" class="reset">リセット</button></header>
<main class="app">
  <div id="status" class="status"></div>
  <section class="boardWrap"><div id="board" class="board"></div><div class="hint">操作：ベンチの駒をタップ → 光ったSPをタップ。盤面の自分の駒をタップ → 青が移動、赤が攻撃。</div></section>
  <section id="p2panel" class="panel p2panel"><h2>Player 2 <small id="p2count"></small></h2><div id="p2bench" class="cards"></div><h2 style="margin-top:12px">PC</h2><div id="p2pc" class="pc"></div></section>
  <section id="p1panel" class="panel p1panel"><h2>Player 1 <small id="p1count"></small></h2><div id="p1bench" class="cards"></div><h2 style="margin-top:12px">PC</h2><div id="p1pc" class="pc"></div></section>
  <div id="log" class="log"></div>
</main>
<script>
const W=7,H=5,TARGET={p1:"3,0",p2:"3,4"},SPAWN={p1:["0,4","6,4"],p2:["0,0","6,0"]};
const TEAM=["pikachu","charmander","bulbasaur","squirtle","eevee","mewtwo"];
const F={
 pikachu:{n:"Pikachu",mp:3,w:[["miss","Miss",0,8],["white","Quick Attack",40,32],["gold","Thunder Shock",30,24],["purple","Thunder Wave",2,20],["white","Iron Tail",70,12]]},
 charmander:{n:"Charmander",mp:3,w:[["miss","Miss",0,8],["white","Scratch",30,36],["white","Ember",50,32],["purple","Smokescreen",1,20]]},
 bulbasaur:{n:"Bulbasaur",mp:3,w:[["miss","Miss",0,8],["white","Vine Whip",40,36],["purple","Poison Powder",1,24],["white","Razor Leaf",60,28]]},
 squirtle:{n:"Squirtle",mp:3,w:[["miss","Miss",0,8],["blue","Withdraw",0,24],["white","Bubble",30,32],["white","Water Gun",60,32]]},
 eevee:{n:"Eevee",mp:3,w:[["miss","Miss",0,8],["white","Quick Attack",40,36],["gold","Double Kick",30,24],["white","Tackle",50,28]]},
 mewtwo:{n:"Mewtwo",mp:2,w:[["miss","Miss",0,4],["white","Psychic",70,32],["purple","Psycho Barrier",2,24],["white","Psystrike",100,28],["gold","Confusion",50,8]]}
};
let seq=1,s;
const $=q=>document.querySelector(q);
function k(x,y){return x+","+y}function xy(c){const a=c.split(",").map(Number);return{x:a[0],y:a[1]}}
function playable(x,y){return x===0||x===W-1||y===0||y===H-1||(x>=2&&x<=4&&y>=1&&y<=3)}
function cells(){const r=[];for(let y=0;y<H;y++)for(let x=0;x<W;x++)r.push({x,y,k:k(x,y),ok:playable(x,y)});return r}
function neigh(c){const p=xy(c),a=[[p.x+1,p.y],[p.x-1,p.y],[p.x,p.y+1],[p.x,p.y-1]];return a.filter(([x,y])=>x>=0&&x<W&&y>=0&&y<H&&playable(x,y)).map(([x,y])=>k(x,y))}
function piece(id,owner){return{id:owner+"-"+(seq++),owner,fig:id,n:F[id].n,mp:F[id].mp,pos:null,wait:0}}
function player(id){return{bench:TEAM.map(t=>piece(t,id)),field:[],pc:[]}}
function init(){seq=1;s={p1:player("p1"),p2:player("p2"),turn:"p1",sel:null,reach:[],attack:[],win:null,log:["ゲーム開始。Player 1から。"]};render()}
function other(p){return p==="p1"?"p2":"p1"}function all(){return[...s.p1.field,...s.p2.field]}function at(c){return all().find(p=>p.pos===c)}function byid(id){return[...s.p1.bench,...s.p2.bench,...s.p1.field,...s.p2.field,...s.p1.pc,...s.p2.pc].find(p=>p.id===id)}
function occupied(){return new Set(all().map(p=>p.pos))}function addlog(t){s.log.unshift(t)}function clear(){s.sel=null;s.reach=[];s.attack=[]}
function end(){clear();s.turn=other(s.turn);for(const p of s[s.turn].bench)if(p.wait>0)p.wait--}
function reachable(start,mp){const occ=occupied(),vis=new Map([[start,0]]),q=[start];while(q.length){const c=q.shift(),d=vis.get(c);if(d>=mp)continue;for(const n of neigh(c)){if(occ.has(n)||vis.has(n))continue;vis.set(n,d+1);q.push(n)}}vis.delete(start);return[...vis.keys()]}
function selectBench(id){if(s.win)return;const p=s[s.turn].bench.find(x=>x.id===id);if(!p||p.wait)return;s.sel={type:"bench",id};s.reach=SPAWN[s.turn].filter(c=>!at(c));s.attack=[];addlog(p.n+"を選択。SPをタップ。");render()}
function selectField(id){if(s.win)return;const p=s[s.turn].field.find(x=>x.id===id);if(!p)return;s.sel={type:"field",id};s.reach=reachable(p.pos,p.mp);s.attack=neigh(p.pos).map(at).filter(x=>x&&x.owner!==p.owner).map(x=>x.pos);addlog(p.n+"を選択。移動か攻撃。");render()}
function clickCell(c){if(s.win)return;const target=at(c);if(target&&target.owner===s.turn){selectField(target.id);return}if(!s.sel)return;if(s.sel.type==="bench"&&s.reach.includes(c)){deploy(c);return}if(s.sel.type==="field"&&s.reach.includes(c)&&!target){move(c);return}if(s.sel.type==="field"&&s.attack.includes(c)&&target){battle(target.id);return}}
function deploy(c){const pl=s[s.turn],p=pl.bench.find(x=>x.id===s.sel.id);pl.bench=pl.bench.filter(x=>x.id!==p.id);p.pos=c;pl.field.push(p);addlog(s.turn.toUpperCase()+" "+p.n+" 出撃: "+c);end();render()}
function move(c){const p=byid(s.sel.id);p.pos=c;addlog(p.owner.toUpperCase()+" "+p.n+" 移動: "+c);if(c===TARGET[p.owner]){s.win=p.owner;clear();addlog(p.owner.toUpperCase()+" 勝利！");render();return}end();render()}
function removeField(p){const pl=s[p.owner];pl.field=pl.field.filter(x=>x.id!==p.id);p.pos=null}
function pc(p){const pl=s[p.owner];removeField(p);if(pl.pc.length>=2){const out=pl.pc.shift();out.wait=1;pl.bench.push(out);addlog(out.n+"がPCからベンチへ。1ターン待機。")}pl.pc.push(p);addlog(p.owner.toUpperCase()+" "+p.n+" はPCへ。")}
function spin(w){let total=w.reduce((a,b)=>a+b[3],0),r=Math.random()*total;for(const seg of w){r-=seg[3];if(r<=0)return seg}return w[w.length-1]}
function cmp(a,b){const fa=a[0],fb=b[0],va=a[2],vb=b[2];if(fa==="miss"&&fb==="miss")return"draw";if(fa==="miss")return"def";if(fb==="miss")return"atk";if(fa==="blue"&&fb==="blue")return"draw";if(fa==="blue")return fb==="gold"?"def":"draw";if(fb==="blue")return fa==="gold"?"atk":"draw";if(fa==="purple"||fb==="purple"){if(fa==="gold")return"atk";if(fb==="gold")return"def";if(fa==="purple"&&fb==="purple")return va===vb?"draw":va>vb?"atk":"def";if(fa==="purple")return"atk";if(fb==="purple")return"def"}return va===vb?"draw":va>vb?"atk":"def"}
function seg(t){if(t[0]==="miss")return t[1];if(t[0]==="blue")return t[1]+" [Blue]";if(t[0]==="purple")return t[1]+" [Purple ★"+t[2]+"]";return t[1]+" ["+t[0]+" "+t[2]+"]"}
function battle(defid){const a=byid(s.sel.id),d=byid(defid),as=spin(F[a.fig].w),ds=spin(F[d.fig].w),r=cmp(as,ds);addlog(a.n+": "+seg(as)+" / "+d.n+": "+seg(ds));if(r==="draw")addlog("引き分け。どちらも残る。");else if(r==="atk"){addlog(a.n+"の勝ち。");pc(d)}else{addlog(d.n+"の勝ち。");pc(a)}end();render()}
function render(){renderStatus();renderBoard();renderPanels();$("#log").textContent=s.log.slice(0,14).join("\n")}
function renderStatus(){const selected=s.sel?byid(s.sel.id):null;$("#status").textContent=s.win?s.win.toUpperCase()+" の勝利！":selected?s.turn.toUpperCase()+" のターン / 選択中: "+selected.n:s.turn.toUpperCase()+" のターン / 駒をタップ";$("#p1panel").classList.toggle("turn",s.turn==="p1"&&!s.win);$("#p2panel").classList.toggle("turn",s.turn==="p2"&&!s.win)}
function renderBoard(){const b=$("#board");b.innerHTML="";for(const c of cells()){const el=document.createElement("button");el.className="cell";el.disabled=!c.ok;if(c.ok)el.classList.add("playable");if(c.k===TARGET.p1)el.classList.add("goal2");if(c.k===TARGET.p2)el.classList.add("goal1");if(SPAWN.p1.includes(c.k)||SPAWN.p2.includes(c.k))el.classList.add("spawn");if(s.reach.includes(c.k))el.classList.add("reach");if(s.attack.includes(c.k))el.classList.add("attack");const p=at(c.k);if(p){const pe=document.createElement("div");pe.className="piece "+p.owner+(s.sel&&s.sel.id===p.id?" sel":"");pe.textContent=p.n;el.append(pe)}else if(c.ok)el.textContent=c.k;el.onclick=()=>{clickCell(c.k)};b.append(el)}}
function renderPanels(){for(const id of ["p1","p2"]){const ben=$("#"+id+"bench"),pcEl=$("#"+id+"pc");ben.innerHTML="";pcEl.innerHTML="";$("#"+id+"count").textContent=s[id].field.length+" on field";for(const p of s[id].bench){const bt=document.createElement("button");bt.className="card"+(s.sel&&s.sel.id===p.id?" active":"");bt.disabled=id!==s.turn||p.wait>0||!!s.win;bt.innerHTML="<span>"+p.n+"</span><br><small>MP "+p.mp+(p.wait?" / wait":"")+"</small>";bt.onclick=()=>selectBench(p.id);ben.append(bt)}for(const p of s[id].pc){const sp=document.createElement("span");sp.textContent=p.n;pcEl.append(sp)}}}
$("#reset").onclick=init;init();
</script>
</body>
</html>
