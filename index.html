<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>コマスター オフライン</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles-patch.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>コマスター</h1>
      <div class="sub">BOSS AI版</div>
    </div>
    <button id="resetBtn" class="reset">リセット</button>
  </header>

  <main class="app">
    <div id="status" class="status"></div>
    <section class="field">
      <div class="scorebar">
        <div class="score p2"><span>相手AI</span><span>6体</span></div>
        <div class="turn">TURN<br><span id="turnCount">1</span></div>
        <div class="score p1"><span>自分</span><span>6体</span></div>
      </div>

      <div id="topBench" class="bench"></div>
      <div id="board" class="board"></div>
      <div id="bottomBench" class="bench"></div>

      <div class="pcRows">
        <div class="pcBox"><div class="pcTitle">相手PC</div><div id="p2pc" class="chips"></div></div>
        <div class="pcBox"><div class="pcTitle">自分PC</div><div id="p1pc" class="chips"></div></div>
      </div>

      <div class="actions bossActions">
        <button id="skipAction" class="action ability" disabled>バトルしない</button>
        <button id="aiBtn" class="action ai">AI ON</button>
      </div>

      <div class="hint">
        6体デッキのBOSS AI版。長押しでフィギュア詳細、移動後に隣接敵を選ぶとバトル。AIは詰み・受け・特性移動を優先して考えます。
      </div>
    </section>
    <div id="log" class="log"></div>
  </main>

  <div id="battleOverlay" class="overlay">
    <div class="box">
      <div class="title">バトルルーレット</div>
      <div class="battleStack">
        <div class="card">
          <div id="topName" class="name"></div>
          <div class="wheelWrap"><div class="pointer"></div><div id="topWheel" class="wheel"></div></div>
          <div id="topResult" class="res"></div>
          <div id="topSegs" class="segs"></div>
        </div>
        <div class="card">
          <div id="bottomName" class="name"></div>
          <div class="wheelWrap"><div class="pointer"></div><div id="bottomWheel" class="wheel"></div></div>
          <div id="bottomResult" class="res"></div>
          <div id="bottomSegs" class="segs"></div>
        </div>
      </div>
      <div id="battleResult" class="result">ルーレット回転中...</div>
      <button id="continueBattle" class="primary" style="display:none">結果を確認して続ける</button>
    </div>
  </div>

  <div id="infoOverlay" class="overlay">
    <div class="box">
      <div class="title" id="infoTitle">フィギュア情報</div>
      <div id="infoBody" class="infoBody"></div>
      <button id="infoClose" class="primary">閉じる</button>
    </div>
  </div>

  <script src="src/data.js"></script>
  <script src="src/state.js"></script>
  <script src="src/rules.js"></script>
  <script src="src/ai-weights.js"></script>
  <script src="src/ai.js"></script>
  <script src="src/effects-patch.js"></script>
  <script src="src/ai-learn-patch.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/ui-patch.js"></script>
  <script src="src/ai-train.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
