<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Rune Clash</title>
  <link rel="stylesheet" href="styles.css?v=20260710-5">
  <link rel="stylesheet" href="styles-patch.css?v=20260710-5">
  <link rel="stylesheet" href="hotfix.css?v=20260710-5">
  <link rel="stylesheet" href="motion.css?v=20260710-5">
  <link rel="stylesheet" href="stand-fix.css?v=20260710-5">
  <link rel="stylesheet" href="rune-flow-fix.css?v=20260710-5">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Rune Clash</h1>
      <div class="sub">消えかけた精霊たちの紋章盤バトル</div>
    </div>
    <button id="resetBtn" class="reset">リセット</button>
  </header>

  <main class="app">
    <div id="status" class="status"></div>
    <section class="field">
      <div class="scorebar">
        <div class="score p2"><span>相手AI</span><span>6体</span></div>
        <div class="turn">TURN<br><span id="turnCount">1</span></div>
        <div class="score p1"><span>自分</span><span>6体</span></div>
      </div>

      <div id="topBench" class="bench"></div>
      <div id="board" class="board"></div>
      <div id="bottomBench" class="bench"></div>

      <div class="pcRows">
        <div class="pcBox"><div class="pcTitle">相手PC</div><div id="p2pc" class="chips"></div></div>
        <div class="pcBox"><div class="pcTitle">自分PC</div><div id="p1pc" class="chips"></div></div>
      </div>

      <section id="plateTray" class="plates"></section>

      <div class="actions bossActions">
        <button id="skipAction" class="action ability" disabled>バトルしない</button>
        <button id="aiBtn" class="action ai">AI ON</button>
      </div>

      <div class="hint">
        精霊たちは紋章盤の上でだけ姿を保てます。魔札は3ターンで薄れて消えるため、毎ターン使いどころを選んで攻めましょう。
      </div>
    </section>
    <div id="log" class="log"></div>
  </main>

  <div id="battleOverlay" class="overlay">
    <div class="box">
      <div class="title">バトルルーレット</div>
      <div class="battleStack">
        <div class="card">
          <div id="topName" class="name"></div>
          <div class="wheelWrap"><div class="pointer"></div><div id="topWheel" class="wheel"></div></div>
          <div id="topResult" class="res"></div>
          <div id="topSegs" class="segs"></div>
        </div>
        <div class="card">
          <div id="bottomName" class="name"></div>
          <div class="wheelWrap"><div class="pointer"></div><div id="bottomWheel" class="wheel"></div></div>
          <div id="bottomResult" class="res"></div>
          <div id="bottomSegs" class="segs"></div>
        </div>
      </div>
      <div id="battleResult" class="result">ルーレット回転中...</div>
      <button id="continueBattle" class="primary" style="display:none">結果を確認して続ける</button>
    </div>
  </div>

  <div id="infoOverlay" class="overlay">
    <div class="box">
      <div class="title" id="infoTitle">ユニット情報</div>
      <div id="infoBody" class="infoBody"></div>
      <button id="infoClose" class="primary">閉じる</button>
    </div>
  </div>

  <script src="src/data.js?v=20260710-5"></script>
  <script src="src/original-party.js?v=20260710-5"></script>
  <script src="src/roster-100.js?v=20260710-5"></script>
  <script src="src/featured-characters.js?v=20260710-5"></script>
  <script src="src/character-art.js?v=20260710-5"></script>
  <script src="src/character-icons.js?v=20260710-5"></script>
  <script src="src/state.js?v=20260710-5"></script>
  <script src="src/rules.js?v=20260710-5"></script>
  <script src="src/ai-weights.js?v=20260710-5"></script>
  <script src="src/ai.js?v=20260710-5"></script>
  <script src="src/ai-goal-guard.js?v=20260710-5"></script>
  <script src="src/ai-hold-goal-guard.js?v=20260710-5"></script>
  <script src="src/effects-patch.js?v=20260710-5"></script>
  <script src="src/gameplay-fixes.js?v=20260710-5"></script>
  <script src="src/rule-break.js?v=20260710-5"></script>
  <script src="src/ai-learn-patch.js?v=20260710-5"></script>
  <script src="src/ui.js?v=20260710-5"></script>
  <script src="src/ui-patch.js?v=20260710-5"></script>
  <script src="src/battle-animations.js?v=20260710-5"></script>
  <script src="src/poison-trails.js?v=20260710-5"></script>
  <script src="src/ai-train.js?v=20260710-5"></script>
  <script src="src/ai-run-safe.js?v=20260710-5"></script>
  <script src="src/plates.js?v=20260710-5"></script>
  <script src="src/cassette-deck.js?v=20260710-5"></script>
  <script src="src/rune-flow-fix.js?v=20260710-5"></script>
  <script src="src/report.js?v=20260710-5"></script>
  <script src="src/report-ui-fix.js?v=20260710-5"></script>
  <script src="src/main.js?v=20260710-5"></script>
  <script src="src/balance-fix.js?v=20260710-5"></script>
</body>
</html>
